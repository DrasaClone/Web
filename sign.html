<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi Danh Lưu Bút - Thanh Xuân 2026</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .center-vault { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 40px 20px; 
            position: relative;
            z-index: 10;
        }
        
        #avatar-preview {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
        }

        #avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .form-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div id="sakura-container"></div>
    <div class="film-grain"></div>

    <main class="center-vault">
        <!-- CỔNG ĐĂNG NHẬP -->
        <div id="auth-portal" style="text-align: center;">
            <div style="margin-bottom: 32px; display: inline-block; padding: 20px; background: var(--surface); border-radius: 50%; box-shadow: var(--shadow-soft);">
                <i data-lucide="smile" size="64" style="color: var(--tertiary);"></i>
            </div>
            <h1 class="title-indie">Chào Cậu, <br> <span style="opacity: 0.6">Người Bạn Cũ!</span></h1>
            <p style="font-size: 1.1rem; color: var(--secondary); margin-bottom: 40px; max-width: 400px; margin-inline: auto;">Đăng nhập bằng Google để chúng mình cùng viết tiếp câu chuyện thanh xuân nhé!</p>
            
            <button id="login-btn" class="btn-indie">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
                <span>VÀO KÝ TÊN</span>
            </button>
            <div class="handwritten" style="margin-top: 48px; opacity: 0.4; font-size: 1.8rem; color: var(--primary);">Hẹn gặp cậu ở bên trong!</div>
        </div>

        <!-- FORM GHI DANH -->
        <div id="reg-section" style="display: none; width: 100%;" class="form-container">
            <div class="sticker-card">
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; gap: 20px;">
                    <div>
                        <span class="handwritten" style="font-size: 1.5rem; color: var(--secondary);">Lưu bút 2026</span>
                        <h2 class="title-indie" style="margin: 8px 0 0 0; text-align: left; font-size: 2.5rem;">Hồ Sơ Của Tớ</h2>
                    </div>
                    <button id="logout-btn" class="btn-outline" style="padding: 8px 16px; font-size: 0.75rem;">ĐĂNG XUẤT</button>
                </div>
                
                <form id="reg-form" class="soft-form">
                    <div class="form-header-grid">
                        <!-- Cột Avatar -->
                        <div>
                            <label for="avatar-input" style="cursor: pointer; height: 100%; display: block;">
                                <div class="avatar-column" id="avatar-preview-container">
                                    <div id="avatar-preview">
                                        <i data-lucide="camera" size="32" style="color: var(--secondary); opacity: 0.5;"></i>
                                        <span style="font-size: 0.8rem; color: var(--secondary); font-weight: 700; margin-top: 8px; font-family: var(--font-body);">ẢNH ĐẠI DIỆN</span>
                                    </div>
                                </div>
                            </label>
                            <input type="file" id="avatar-input" hidden accept="image/*">
                        </div>
                        
                        <!-- Cột Thông tin cơ bản -->
                        <div class="input-column">
                            <div class="form-group">
                                <label>Tên gọi thương nhớ</label>
                                <input type="text" id="reg-name" required placeholder="Cậu muốn chúng tớ gọi cậu là gì?">
                            </div>
                            <div class="form-group">
                                <label>Bản ngã năm 17 tuổi</label>
                                <input type="text" id="reg-personality" required placeholder="Năng nổ, hay ngủ gật, thánh ăn vặt...">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Vệt nắng rực rỡ nhất (Thành tựu)</label>
                        <textarea id="reg-achievements" required style="height: 100px;" placeholder="Chạy KPI điểm số, hay chỉ đơn giản là đã dám tỏ tình? Khoe đi!"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Lời nhắn gửi mai sau</label>
                        <input type="text" id="reg-quote" required placeholder="Gửi một lời chúc đến chúng mình của tương lai...">
                    </div>

                    <div class="form-group">
                        <label>Giai điệu của chúng ta (Link Spotify/Youtube)</label>
                        <input type="text" id="reg-song" placeholder="Dán link bản nhạc cậu đang nghe lúc này...">
                    </div>

                    <div class="form-group">
                        <label>Kỷ niệm đóng băng (Bí mật nhé)</label>
                        <textarea id="reg-secret" required style="height: 100px;" placeholder="Những rung động chưa dám nói, những trò quậy phá giấu thầy cô..."></textarea>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 16px; margin-top: 24px;">
                        <button type="submit" id="reg-submit" class="btn-indie" style="width: 100%;">
                            <i data-lucide="heart" size="18"></i>
                            <span>LƯU KỶ NIỆM</span>
                        </button>
                        <a href="myclass.html" id="view-class-btn" class="btn-outline" style="display: none; width: 100%;">
                            <i data-lucide="users" size="18"></i>
                            <span>GHÉ THĂM LỚP MÌNH</span>
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/firebase-init.js"></script>
    <script src="assets/js/app-sign.js"></script>
    <script>
        window.addEventListener('load', () => {
            lucide.createIcons();
            gsap.from("#auth-portal > *", { opacity: 0, y: 20, duration: 1, stagger: 0.15, clearProps: "all" });
        });
    </script>
</body>
</html>
