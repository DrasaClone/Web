<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi Danh Lưu Bút - Thanh Xuân 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;500;700&family=Nunito:wght@300;400;600;700&family=Sriracha&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --sakura-pink: #ff8fab; --sakura-deep: #fb6f92; --text-human: #374151; --font-title: 'Mali', cursive; --font-body: 'Nunito', sans-serif; --font-hand: 'Sriracha', cursive; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #fffcf9; color: var(--text-human); font-family: var(--font-body); overflow-x: hidden; min-height: 100vh; }
        
        .bg-fixed-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover !important; background-position: center !important; background-attachment: fixed !important; z-index: -1; }
        .bg-sign { background: linear-gradient(rgba(255,252,249,0.45), rgba(255,252,249,0.55)), url('assets/sign.jpg'); }

        .center-vault { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px; }
        
        .title-indie { font-family: var(--font-title); font-size: clamp(2.5rem, 8vw, 4.5rem); color: var(--sakura-deep); line-height: 1.1; margin-bottom: 20px; text-align: center; }
        .sticker-card { background: white; padding: clamp(20px, 5vw, 50px); border-radius: 12px; box-shadow: 15px 15px 0px #fef3c7; border: 2px solid #333; width: 100%; max-width: 850px; }
        
        .btn-indie { 
            font-family: var(--font-title); background: white; color: var(--text-human); 
            border: 2px solid #333; padding: 0 30px; height: 56px; border-radius: 50px; 
            box-shadow: 4px 4px 0px #333; transition: all 0.3s ease; 
            text-decoration: none; display: flex; align-items: center; justify-content: center; 
            gap: 12px; font-size: 1.1rem; min-width: 280px; margin: 0 auto;
        }
        .btn-indie:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--sakura-pink); border-color: var(--sakura-pink); color: var(--sakura-pink); }
        
        .soft-form input, .soft-form textarea { width: 100%; padding: 15px; border: 2px dashed #ccc; border-radius: 8px; font-family: inherit; margin-top: 5px; outline: none; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        @media (max-width: 768px) { .input-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="bg-sign bg-fixed-layer">
    <div id="sakura-container"></div>

    <main class="center-vault">
        <!-- CỔNG ĐĂNG NHẬP -->
        <div id="auth-portal" style="text-align: center;">
            <h1 class="title-indie">Chào Cậu, <br> Bạn Cũ!</h1>
            <p style="font-size: 1.2rem; font-family: var(--font-hand); margin-bottom: 40px;">Đăng nhập bằng Google để chúng mình <br> cùng viết lưu bút nhé!</p>
            
            <button id="login-btn" class="btn-indie">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
                <span>VÀO KÝ TÊN</span>
            </button>
            <div style="margin-top: 50px; opacity: 0.5; font-family: var(--font-hand); font-size: 1.5rem;">Hẹn gặp cậu ở bên trong!</div>
        </div>

        <!-- FORM GHI DANH -->
        <div id="reg-section" style="display: none; width: 100%; max-width: 850px;">
            <div class="sticker-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; flex-wrap: wrap; gap: 20px;">
                    <h2 class="title-indie" style="margin: 0;">Hồ Sơ Của Tớ</h2>
                    <button id="logout-btn" class="btn-indie" style="min-height: 40px; padding: 0 15px; font-size: 0.9rem; min-width: auto;">Đăng xuất</button>
                </div>
                
                <form id="reg-form" class="soft-form">
                    <div class="input-grid">
                        <div style="text-align: center;">
                            <label for="avatar-input" style="cursor: pointer;">
                                <div id="avatar-preview" style="width: 100%; aspect-ratio: 0.8; border: 2px dashed #ccc; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: #fafafa; overflow: hidden;">
                                    <span style="font-size: 0.8rem; opacity: 0.4;">CHỌN ẢNH XINH</span>
                                </div>
                            </label>
                            <input type="file" id="avatar-input" hidden accept="image/*">
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 15px; text-align: left;">
                            <div class="form-group">
                                <label style="font-family: var(--font-hand); font-size: 1.2rem;">Tên của cậu</label>
                                <input type="text" id="reg-name" required>
                            </div>
                            <div class="form-group">
                                <label style="font-family: var(--font-hand); font-size: 1.2rem;">Tính cách</label>
                                <input type="text" id="reg-personality" required>
                            </div>
                        </div>
                    </div>
                    <div class="form-group" style="margin-top: 20px; text-align: left;">
                        <label style="font-family: var(--font-hand); font-size: 1.2rem;">Thành tựu tự hào</label>
                        <textarea id="reg-achievements" required style="height: 80px;"></textarea>
                    </div>
                    <div class="input-grid" style="margin-top: 20px;">
                        <div class="form-group" style="text-align: left;">
                            <label style="font-family: var(--font-hand); font-size: 1.2rem;">Lời nhắn cho lớp</label>
                            <input type="text" id="reg-quote" required>
                        </div>
                        <div class="form-group" style="text-align: left;">
                            <label style="font-family: var(--font-hand); font-size: 1.2rem;">Kỷ niệm riêng</label>
                            <textarea id="reg-secret" required style="height: 80px;"></textarea>
                        </div>
                    </div>
                    <div style="display: flex; gap: 20px; margin-top: 40px;">
                        <button type="submit" id="reg-submit" class="btn-indie" style="flex: 1.5; background: var(--sakura-pink); color: white;">LƯU KỶ NIỆM</button>
                        <a href="myclass.html" id="view-class-btn" class="btn-indie" style="flex: 1; background: #e0f2fe; display: none;">XEM TRANG LỚP</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/firebase-init.js"></script>
    <script src="assets/js/app-sign.js"></script>
    <script>
        window.addEventListener('load', () => {
            lucide.createIcons();
            gsap.from("#auth-portal > *", { opacity: 0, y: 20, duration: 1, stagger: 0.15, clearProps: "all" });
        });
    </script>
</body>
</html>
