<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi Danh Kỷ Yếu - Lưu Bút Thanh Xuân</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="sakura-container"></div>
    <div class="sun-flare"></div>

    <!-- CỔNG ĐĂNG NHẬP TRUNG TÂM TUYỆT ĐỐI -->
    <div id="auth-portal" class="absolute-center">
        <span class="label-cap">AUTHORIZED_ACCESS_ONLY</span>
        <h1 class="title-presentation">Thanh Xuân <br> <span style="color: var(--sakura-vibrant);">Rực Rỡ</span></h1>
        <p style="opacity: 0.8; margin-bottom: 40px; font-size: 1.1rem;">Chúng mình cùng lưu giữ những mảnh ghép đẹp nhất nhé.</p>
        
        <button id="login-btn" class="google-btn-fixed">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="22">
            <span>Đăng nhập bằng Google</span>
        </button>
        
        <div class="subtitle-presentation" style="margin-top: 60px; opacity: 0.5;">Hẹn gặp cậu ở bên trong!</div>
    </div>

    <!-- TRANG GHI DANH (OVERLAY CỨNG) -->
    <div id="reg-section" class="reg-overlay">
        <div class="glass-card-fixed">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px;">
                <h2 class="title-presentation" style="font-size: 2.8rem; margin: 0; text-align: left;">Hồ Sơ <br><span style="color: var(--sakura-vibrant);">Của Tớ</span></h2>
                <button id="logout-btn" class="label-cap" style="background: none; border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 100px; cursor: pointer; color: white;">ĐĂNG XUẤT</button>
            </div>
            
            <form id="reg-form" class="soft-form">
                <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; margin-bottom: 30px;">
                    <div style="text-align: center;">
                        <label for="avatar-input" style="cursor: pointer;">
                            <div id="avatar-preview" style="width: 100%; aspect-ratio: 0.85; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); overflow: hidden;">
                                <i data-lucide="camera" style="width: 40px; opacity: 0.4;"></i>
                                <span class="label-cap" style="font-size: 0.6rem; margin-top: 10px;">ẢNH CỦA CẬU</span>
                            </div>
                        </label>
                        <input type="file" id="avatar-input" hidden accept="image/*">
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 20px;">
                        <div class="form-group">
                            <label class="label-cap" style="font-size: 0.6rem;">TÊN THÂN MẬT</label>
                            <input type="text" id="reg-name" placeholder="..." required>
                        </div>
                        <div class="form-group">
                            <label class="label-cap" style="font-size: 0.6rem;">TÍNH CÁCH</label>
                            <input type="text" id="reg-personality" placeholder="..." required>
                        </div>
                        <div class="form-group">
                            <label class="label-cap" style="font-size: 0.6rem;">THÀNH TỰU</label>
                            <textarea id="reg-achievements" placeholder="..." required style="height: 100px;"></textarea>
                        </div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                    <div class="form-group">
                        <label class="label-cap" style="font-size: 0.6rem;">LỜI NHẮN</label>
                        <input type="text" id="reg-quote" placeholder="..." required>
                    </div>
                    <div class="form-group">
                        <label class="label-cap" style="font-size: 0.6rem;">KỶ NIỆM BÍ MẬT</label>
                        <textarea id="reg-secret" placeholder="..." required style="height: 100px;"></textarea>
                    </div>
                </div>

                <div style="display: flex; gap: 20px; margin-top: 50px;">
                    <button type="submit" id="reg-submit" class="submit-btn" style="flex: 1.5;">LƯU KỶ NIỆM</button>
                    <a href="myclass.html" id="view-class-btn" class="submit-btn" style="flex: 1; background: white; color: black; text-decoration: none; text-align: center; display: none; line-height: 2.2;">VÀO TRANG LỚP</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/firebase-init.js"></script>
    <script src="assets/js/app-sign.js"></script>
    <script>
        lucide.createIcons();
        // Hiệu ứng Sakura lơ lửng nhẹ
        const container = document.getElementById('sakura-container');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.innerHTML = '🌸';
            p.style.cssText = `position:fixed; top:-50px; left:${Math.random()*100}vw; font-size:${Math.random()*20+15}px; opacity:${Math.random()*0.5}; pointer-events:none; z-index:1;`;
            container.appendChild(p);
            gsap.to(p, { y: '110vh', x: '+=100', rotation: 360, duration: 8 + Math.random() * 5, repeat: -1, delay: Math.random() * 5, ease: 'none' });
        }
        // Ép hiển thị đúng flex cho registration
        window.addEventListener('firebase-ready', () => {
            const observer = new MutationObserver(() => {
                const reg = document.getElementById('reg-section');
                if (reg.style.display === 'block') reg.style.display = 'flex';
            });
            observer.observe(document.getElementById('reg-section'), { attributes: true, attributeFilter: ['style'] });
        });
    </script>
</body>
</html>
