<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi Danh Lưu Bút - Thanh Xuân 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;500;700&family=Nunito:wght@300;400;600;700&family=Sriracha&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --sakura-base: #fffcf9; --sakura-pink: #ff8fab; --sakura-deep: #fb6f92; --sunny-yellow: #fef3c7; --sky-blue: #e0f2fe; --ink-blue: #3b82f6; --text-human: #374151; --font-title: 'Mali', cursive; --font-body: 'Nunito', sans-serif; --font-hand: 'Sriracha', cursive; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--sakura-base); color: var(--text-human); font-family: var(--font-body); overflow-x: hidden; line-height: 1.6; }
        .bg-fixed-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover !important; background-position: center !important; background-attachment: fixed !important; z-index: -1; }
        .bg-sign { background: linear-gradient(rgba(255,252,249,0.7), rgba(255,252,249,0.8)), url('assets/sign.jpg'); }
        .indie-container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px; position: relative; }
        .section-wrapper { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px 0; text-align: center; }
        .title-indie { font-family: var(--font-title); font-size: clamp(2.5rem, 8vw, 4rem); color: var(--sakura-deep); line-height: 1.1; margin-bottom: 20px; }
        .sticker-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 10px 10px 0px var(--sunny-yellow); border: 2px solid #333; width: 100%; max-width: 850px; }
        .soft-form { display: flex; flex-direction: column; gap: 25px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; text-align: left; }
        .form-group label { font-family: var(--font-hand); font-size: 1.3rem; color: var(--text-human); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .reg-split { grid-template-columns: 1fr 1.5fr; }
        input, textarea { width: 100%; padding: 15px 20px; border: 2px dashed #ccc; border-radius: 8px; background: #fafafa; font-family: var(--font-body); font-size: 1rem; color: var(--text-human); outline: none; transition: all 0.3s ease; }
        input:focus, textarea:focus { border-color: var(--sakura-pink); background: white; box-shadow: 0 0 15px rgba(255, 143, 171, 0.2); }
        .btn-indie { font-family: var(--font-title); background: white; color: var(--text-human); border: 2px solid #333; padding: 12px 30px; border-radius: 50px; box-shadow: 4px 4px 0px #333; transition: all 0.2s; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.1rem; }
        .btn-indie:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--sakura-pink); border-color: var(--sakura-pink); color: var(--sakura-pink); }
        .avatar-preview-box { width: 220px; height: 280px; border-radius: 12px; border: 2px dashed #ccc; background: #fafafa; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; margin: 0 auto; }
        .avatar-preview-box img { width: 100%; height: 100%; object-fit: cover; }
        @media (max-width: 768px) { .input-grid, .reg-split { grid-template-columns: 1fr; } .sticker-card { padding: 20px; } }
        #sakura-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .film-grain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; opacity: 0.05; background: url('https://www.transparenttextures.com/patterns/stardust.png'); }
    </style>
</head>
<body class="bg-sign bg-fixed-layer">
    <div id="sakura-container"></div>
    <div class="film-grain"></div>

    <main class="indie-container">
        <!-- CỔNG ĐĂNG NHẬP -->
        <div id="auth-portal" class="section-wrapper">
            <h1 class="title-indie">Chào Cậu, <br> Bạn Cũ!</h1>
            <p style="font-size: 1.3rem; font-family: var(--font-hand); color: var(--text-human); margin-bottom: 40px;">Đăng nhập để chúng mình cùng viết lưu bút nhé!</p>
            <button id="login-btn" class="btn-indie">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
                <span>VÀO KÝ TÊN</span>
            </button>
            <div style="margin-top: 60px; opacity: 0.5; font-family: var(--font-hand); font-size: 1.5rem;">Hẹn gặp cậu ở bên trong!</div>
        </div>

        <!-- FORM GHI DANH -->
        <div id="reg-section" style="display: none; padding: 40px 0;">
            <div class="sticker-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; flex-wrap: wrap; gap: 20px;">
                    <h2 class="title-indie" style="margin: 0;">Hồ Sơ Của Tớ</h2>
                    <button id="logout-btn" class="btn-indie" style="min-height: 40px; padding: 0 15px; font-size: 0.9rem;">Đăng xuất</button>
                </div>
                
                <form id="reg-form" class="soft-form">
                    <div class="input-grid reg-split">
                        <div style="text-align: center;">
                            <label for="avatar-input">
                                <div id="avatar-preview" class="avatar-preview-box">
                                    <div style="text-align: center; font-family: var(--font-hand);">
                                        <i data-lucide="image" style="width: 40px; margin-bottom: 10px; opacity: 0.3;"></i><br>
                                        CHỌN ẢNH XINH
                                    </div>
                                </div>
                            </label>
                            <input type="file" id="avatar-input" hidden accept="image/*">
                        </div>

                        <div style="display: flex; flex-direction: column; gap: 20px;">
                            <div class="form-group">
                                <label>Tên thân mật của cậu</label>
                                <input type="text" id="reg-name" required placeholder="...">
                            </div>
                            <div class="form-group">
                                <label>Tính cách nổi bật</label>
                                <input type="text" id="reg-personality" required placeholder="...">
                            </div>
                            <div class="form-group">
                                <label>Thành tựu tự hào nhất</label>
                                <textarea id="reg-achievements" required style="height: 100px;" placeholder="..."></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="input-grid">
                        <div class="form-group">
                            <label>Lời nhắn cho cả lớp</label>
                            <input type="text" id="reg-quote" required placeholder="...">
                        </div>
                        <div class="form-group">
                            <label>Kỷ niệm thầm kín</label>
                            <textarea id="reg-secret" required style="height: 100px;" placeholder="..."></textarea>
                        </div>
                    </div>

                    <div class="btn-group">
                        <button type="submit" id="reg-submit" class="btn-indie" style="flex: 1.5; background: var(--sakura-pink); color: white; border-color: var(--sakura-pink);">LƯU LẠI KỶ NIỆM</button>
                        <a href="myclass.html" id="view-class-btn" class="btn-indie" style="flex: 1; background: var(--sky-blue); display: none;">XEM TRANG LỚP</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/firebase-init.js"></script>
    <script src="assets/js/app-sign.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
