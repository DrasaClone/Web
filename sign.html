<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tham Gia Kỷ Yếu - Lưu Bút Thanh Xuân</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="presentation-container">
    <div id="sakura-container"></div>
    <div class="sun-flare"></div>

    <!-- MAIN PORTAL -->
    <main class="portal-stack">
        
        <!-- CỔNG ĐĂNG NHẬP (MINIMALIST & CENTERED) -->
        <div id="auth-portal" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <div class="label-cap" style="color: white; opacity: 0.5; margin-bottom: 30px;">AUTH_ACCESS // CLASS_2026</div>
            <h1 class="title-presentation">Ký Ức <br> <span style="color: var(--sakura-vibrant);">Rực Rỡ</span></h1>
            <p style="opacity: 0.8; font-size: 1.1rem; line-height: 1.6; margin-bottom: 10px;">Chúng mình cùng lưu giữ những mảnh ghép đẹp nhất nhé.</p>
            
            <button id="login-btn" class="google-btn-pill">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20" alt="Google">
                <span>Tham gia bằng Google</span>
            </button>
            
            <div class="subtitle-presentation" style="margin-top: 50px; font-size: 1.4rem; opacity: 0.6;">Hẹn gặp cậu ở bên trong!</div>
        </div>

        <!-- FORM ĐĂNG KÝ (NEW BENTO LAYOUT) -->
        <div id="reg-section" style="display: none; width: 100%; max-width: 900px;">
            <div class="glass-box-new">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                    <h2 class="title-presentation" style="font-size: 2.8rem; margin: 0; text-align: left;">Hồ Sơ <br><span style="color: var(--sakura-vibrant);">Của Tớ</span></h2>
                    <button id="logout-btn" class="label-cap" style="background: none; border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 100px; cursor: pointer; color: white;">ĐĂNG XUẤT</button>
                </div>
                
                <form id="reg-form" class="soft-form">
                    <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; margin-bottom: 30px;">
                        <div style="text-align: center;">
                            <label for="avatar-input" style="cursor: pointer;">
                                <div id="avatar-preview" style="width: 100%; aspect-ratio: 0.85; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;">
                                    <i data-lucide="camera" style="width: 30px; opacity: 0.3; margin-bottom: 10px;"></i>
                                    <span class="label-cap" style="font-size: 0.6rem;">ẢNH CHÂN DUNG</span>
                                </div>
                            </label>
                            <input type="file" id="avatar-input" hidden accept="image/*">
                        </div>

                        <div style="display: flex; flex-direction: column; gap: 15px; text-align: left;">
                            <div class="form-group">
                                <label class="label-cap">Tên thân mật</label>
                                <input type="text" id="reg-name" placeholder="..." required>
                            </div>
                            <div class="form-group">
                                <label class="label-cap">Tính cách</label>
                                <input type="text" id="reg-personality" placeholder="..." required>
                            </div>
                            <div class="form-group">
                                <label class="label-cap">Thành tựu</label>
                                <textarea id="reg-achievements" placeholder="..." required style="height: 70px;"></textarea>
                            </div>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left;">
                        <div class="form-group">
                            <label class="label-cap">Lời nhắn cho cả lớp</label>
                            <input type="text" id="reg-quote" placeholder="..." required>
                        </div>
                        <div class="form-group">
                            <label class="label-cap">Kỷ niệm bí mật</label>
                            <textarea id="reg-secret" placeholder="..." required style="height: 70px;"></textarea>
                        </div>
                    </div>

                    <div style="display: flex; gap: 20px; margin-top: 40px;">
                        <button type="submit" id="reg-submit" class="submit-btn" style="flex: 1.5; border-radius: 100px;">LƯU KỶ NIỆM</button>
                        <a href="myclass.html" id="view-class-btn" class="submit-btn" style="flex: 1; background: white; color: black; text-decoration: none; text-align: center; border-radius: 100px; display: none; padding-top: 18px;">VÀO TRANG LỚP</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/firebase-init.js"></script>
    <script src="assets/js/app-sign.js"></script>
    <script>
        lucide.createIcons();
        gsap.from(".portal-stack", { opacity: 0, y: 30, duration: 1.5, ease: "power3.out" });
    </script>
</body>
</html>
