<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Ghi Danh - Lưu Bút Thanh Xuân</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background-color: var(--base-dark); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;">
    <div id="sakura-container"></div>
    <div class="sun-flare" style="opacity: 0.5;"></div>

    <!-- PORTAL CARD -->
    <div id="auth-portal" class="portal-card">
        <div class="label-cap" style="color: white; opacity: 0.5; margin-bottom: 20px;">SECURE_MEMORY_PORTAL</div>
        <h1 class="title-presentation" style="font-size: 4rem;">Ghi Danh <br><span style="color: var(--sakura-vibrant);">Kỷ Yếu</span></h1>
        <p style="opacity: 0.7; max-width: 400px; margin: 0 auto;">Cùng chúng mình lưu giữ những khoảnh khắc rực rỡ nhất của niên khóa 2026.</p>
        
        <button id="login-btn" class="google-btn-premium">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="22">
            <span>Tham gia bằng Google</span>
        </button>
        
        <div class="subtitle-presentation" style="margin-top: 40px; font-size: 1.5rem;">Hẹn gặp lại cậu ở bên trong!</div>
    </div>

    <!-- REGISTRATION FORM (MODERN BENTO) -->
    <div id="reg-section" style="display: none; width: 100%; max-width: 1000px;">
        <div class="glass-card" style="padding: 60px; cursor: default;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <h2 class="title-presentation" style="font-size: 3rem; margin: 0;">Hồ Sơ <span style="color: var(--sakura-vibrant);">Của Tớ</span></h2>
                <button id="logout-btn" class="label-cap" style="background: none; border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 100px; cursor: pointer; color: white;">ĐĂNG XUẤT</button>
            </div>
            
            <form id="reg-form" class="soft-form">
                <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 50px;">
                    <div style="text-align: center;">
                        <label for="avatar-input">
                            <div id="avatar-preview" style="width: 100%; aspect-ratio: 0.8; border-radius: 24px; border: 2px dashed var(--glass-border); display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,255,255,0.02); cursor: pointer; overflow: hidden;">
                                <i data-lucide="camera" style="width: 40px; height: 40px; opacity: 0.3; margin-bottom: 10px;"></i>
                                <span class="label-cap" style="font-size: 0.6rem;">Tải ảnh chân dung</span>
                            </div>
                        </label>
                        <input type="file" id="avatar-input" hidden accept="image/*">
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 20px;">
                        <div class="form-group">
                            <label class="label-cap">Tên thân mật của cậu</label>
                            <input type="text" id="reg-name" placeholder="Ví dụ: Alex hay cười..." required>
                        </div>
                        <div class="form-group">
                            <label class="label-cap">Tính cách đặc trưng</label>
                            <input type="text" id="reg-personality" placeholder="VD: Vui tính, năng nổ, trầm mặc..." required>
                        </div>
                        <div class="form-group">
                            <label class="label-cap">Thành tựu rực rỡ</label>
                            <textarea id="reg-achievements" placeholder="Những gì cậu tự hào nhất về bản thân..." required style="height: 100px;"></textarea>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                    <div class="form-group">
                        <label class="label-cap">Lời nhắn gửi cả lớp</label>
                        <input type="text" id="reg-quote" placeholder="Một câu nói tâm đắc nhất của cậu..." required>
                    </div>
                    <div class="form-group">
                        <label class="label-cap">Kỷ niệm bí mật (Secret)</label>
                        <textarea id="reg-secret" placeholder="Điều mà chỉ chúng mình mới biết với nhau..." required style="height: 100px;"></textarea>
                    </div>
                </div>

                <div style="display: flex; gap: 20px; margin-top: 50px;">
                    <button type="submit" id="reg-submit" class="submit-btn" style="flex: 1.5;">LƯU LẠI HÀNH TRÌNH</button>
                    <a href="myclass.html" id="view-class-btn" class="submit-btn" style="flex: 1; background: #fff; color: var(--base-dark); text-decoration: none; text-align: center; display: none;">XEM THÀNH QUẢ</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/firebase-init.js"></script>
    <script src="assets/js/app-sign.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
