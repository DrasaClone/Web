<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi Danh Kỷ Yếu - Lưu Bút Thanh Xuân</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="sakura-container"></div>
    <div class="sun-flare" style="opacity: 0.5;"></div>

    <main class="content-anchor" style="min-height: 100vh;">
        
        <!-- CỔNG ĐĂNG NHẬP -->
        <div id="auth-portal" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <div class="label-cap">SECURE_ACCESS_PORTAL_2026</div>
            <h1 class="title-presentation">Ghi Danh <br> <span style="color: var(--sakura-vibrant);">Kỷ Yếu</span></h1>
            <p style="opacity: 0.8; font-size: 1.1rem; line-height: 1.6; max-width: 450px;">Chúng mình cùng lưu giữ những mảnh ghép đẹp nhất nhé.</p>
            
            <button id="login-btn" class="google-btn-premium" style="margin-top: 50px;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="Google">
                <span>Tham gia bằng Google</span>
            </button>
            
            <div class="subtitle-presentation" style="margin-top: 60px; font-size: 1.5rem; opacity: 0.6;">Hẹn gặp cậu ở bên trong!</div>
        </div>

        <!-- FORM ĐĂNG KÝ (FIXED OVERLAY) -->
        <div id="reg-section" class="reg-overlay">
            <div class="glass-card" style="width: 100%; max-width: 900px; padding: 50px; cursor: default; border-radius: 40px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                    <h2 class="title-presentation" style="font-size: 2.8rem; margin: 0; text-align: left;">Hồ Sơ <br><span style="color: var(--sakura-vibrant);">Của Tớ</span></h2>
                    <button id="logout-btn" class="label-cap" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 100px; cursor: pointer; color: white; margin: 0;">ĐĂNG XUẤT</button>
                </div>
                
                <form id="reg-form" class="soft-form">
                    <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; margin-bottom: 30px; text-align: left;">
                        <div style="text-align: center;">
                            <label for="avatar-input" style="cursor: pointer;">
                                <div id="avatar-preview" style="width: 100%; aspect-ratio: 0.85; border-radius: 20px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;">
                                    <i data-lucide="camera" style="width: 30px; opacity: 0.3; margin-bottom: 10px;"></i>
                                    <span class="label-cap" style="font-size: 0.6rem;">ẢNH CHÂN DUNG</span>
                                </div>
                            </label>
                            <input type="file" id="avatar-input" hidden accept="image/*">
                        </div>

                        <div style="display: flex; flex-direction: column; gap: 15px;">
                            <div class="form-group">
                                <label class="label-cap" style="font-size: 0.6rem;">TÊN THÂN MẬT</label>
                                <input type="text" id="reg-name" required>
                            </div>
                            <div class="form-group">
                                <label class="label-cap" style="font-size: 0.6rem;">TÍNH CÁCH</label>
                                <input type="text" id="reg-personality" required>
                            </div>
                            <div class="form-group">
                                <label class="label-cap" style="font-size: 0.6rem;">THÀNH TỰU</label>
                                <textarea id="reg-achievements" required style="height: 80px;"></textarea>
                            </div>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px; text-align: left;">
                        <div class="form-group">
                            <label class="label-cap" style="font-size: 0.6rem;">LỜI NHẮN</label>
                            <input type="text" id="reg-quote" required>
                        </div>
                        <div class="form-group">
                            <label class="label-cap" style="font-size: 0.6rem;">KỶ NIỆM BÍ MẬT</label>
                            <textarea id="reg-secret" required style="height: 80px;"></textarea>
                        </div>
                    </div>

                    <div style="display: flex; gap: 20px; margin-top: 40px;">
                        <button type="submit" id="reg-submit" class="submit-btn" style="flex: 1.5; border-radius: 100px;">LƯU LẠI KỶ NIỆM</button>
                        <a href="myclass.html" id="view-class-btn" class="submit-btn" style="flex: 1; background: white; color: black; text-decoration: none; text-align: center; border-radius: 100px; display: none; padding-top: 18px;">VÀO TRANG LỚP</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/firebase-init.js"></script>
    <script src="assets/js/app-sign.js"></script>
    <script>
        lucide.createIcons();
        // Cố định Registration Overlay bằng Flex
        window.addEventListener('firebase-ready', () => {
            const observer = new MutationObserver(() => {
                const reg = document.getElementById('reg-section');
                if (reg.style.display === 'block') reg.style.display = 'flex';
            });
            observer.observe(document.getElementById('reg-section'), { attributes: true, attributeFilter: ['style'] });
        });
        // Animation Entry (Clear Props to stay centered)
        gsap.from("#auth-portal > *", { opacity: 0, y: 20, duration: 1, stagger: 0.15, ease: "power2.out", clearProps: "all" });
    </script>
</body>
</html>
