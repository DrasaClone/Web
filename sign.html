<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi Danh Lưu Bút - Thanh Xuân 2026</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .center-vault { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 40px 20px; 
            position: relative;
            z-index: 10;
        }
        
        .title-indie { 
            font-family: var(--font-display); 
            font-size: clamp(2.5rem, 8vw, 4rem); 
            color: var(--primary); 
            line-height: 1.1; 
            margin-bottom: 24px; 
            text-align: center;
            font-weight: 600;
        }

        #avatar-preview {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
        }

        #avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .form-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body class="bg-sign bg-fixed-layer">
    <div id="sakura-container"></div>
    <div class="film-grain"></div>

    <main class="center-vault">
        <!-- CỔNG ĐĂNG NHẬP -->
        <div id="auth-portal" style="text-align: center;">
            <div style="margin-bottom: 32px; display: inline-block; padding: 20px; background: var(--surface); border-radius: 50%; box-shadow: 0 10px 30px rgba(58,39,71,0.05);">
                <i data-lucide="smile" size="64" style="color: var(--tertiary);"></i>
            </div>
            <h1 class="title-indie">Chào Cậu, <br> <span style="opacity: 0.6">Bạn Cũ!</span></h1>
            <p style="font-size: 1.1rem; color: var(--secondary); margin-bottom: 40px; max-width: 400px; margin-inline: auto;">Đăng nhập bằng Google để chúng mình cùng viết tiếp câu chuyện thanh xuân nhé!</p>
            
            <button id="login-btn" class="btn-indie">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
                <span>VÀO KÝ TÊN</span>
            </button>
            <div class="handwritten" style="margin-top: 48px; opacity: 0.4; font-size: 1.5rem; color: var(--primary);">Hẹn gặp cậu ở bên trong!</div>
        </div>

        <!-- FORM GHI DANH -->
        <div id="reg-section" style="display: none; width: 100%;" class="form-container">
            <div class="sticker-card">
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; gap: 20px;">
                    <div>
                        <span class="handwritten" style="font-size: 1.2rem; color: var(--secondary);">Lưu bút 2026</span>
                        <h2 class="title-indie" style="margin: 8px 0 0 0; text-align: left; font-size: 2rem;">Hồ Sơ Của Tớ</h2>
                    </div>
                    <button id="logout-btn" class="btn-indie" style="padding: 8px 16px; font-size: 0.75rem; min-width: auto; height: auto;">ĐĂNG XUẤT</button>
                </div>
                
                <form id="reg-form" class="soft-form">
                    <div style="margin-bottom: 8px;">
                        <label for="avatar-input" style="cursor: pointer; display: block;">
                            <div class="avatar-preview-box" id="avatar-preview-container">
                                <div id="avatar-preview">
                                    <i data-lucide="camera" size="32" style="color: var(--secondary); opacity: 0.5;"></i>
                                    <span style="font-size: 0.7rem; color: var(--secondary); font-weight: 700; margin-top: 8px;">TẢI ẢNH CỦA CẬU</span>
                                </div>
                            </div>
                        </label>
                        <input type="file" id="avatar-input" hidden accept="image/*">
                    </div>

                    <div class="form-group">
                        <label>Tên của cậu</label>
                        <input type="text" id="reg-name" required placeholder="Nhập tên nhé...">
                    </div>
                    
                    <div class="form-group">
                        <label>Tính cách</label>
                        <input type="text" id="reg-personality" required placeholder="Vui vẻ, hòa đồng, hay cười...">
                    </div>

                    <div class="form-group">
                        <label>Thành tựu tự hào</label>
                        <textarea id="reg-achievements" required style="height: 100px;" placeholder="Giải nhất cuộc thi, học bổng..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Lời nhắn cho lớp</label>
                        <input type="text" id="reg-quote" required placeholder="Mãi bên nhau nhé!">
                    </div>

                    <div class="form-group">
                        <label>Kỷ niệm bí mật (Chỉ cậu biết)</label>
                        <textarea id="reg-secret" required style="height: 100px;" placeholder="Kể cho tớ nghe đi..."></textarea>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 16px; margin-top: 16px;">
                        <button type="submit" id="reg-submit" class="btn-indie" style="background: var(--tertiary); color: var(--on-primary); border: none; width: 100%;">
                            <i data-lucide="send" size="18"></i>
                            <span>LƯU KỶ NIỆM</span>
                        </button>
                        <a href="myclass.html" id="view-class-btn" class="btn-indie" style="background: var(--neutral); display: none; width: 100%;">
                            <i data-lucide="users" size="18"></i>
                            <span>XEM TRANG LỚP</span>
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/firebase-init.js"></script>
    <script src="assets/js/app-sign.js"></script>
    <script>
        window.addEventListener('load', () => {
            lucide.createIcons();
            gsap.from("#auth-portal > *", { opacity: 0, y: 20, duration: 1, stagger: 0.15, clearProps: "all" });
            
            // Preview ảnh
            const avatarInput = document.getElementById('avatar-input');
            const avatarPreview = document.getElementById('avatar-preview');
            
            avatarInput.addEventListener('change', (e) => {
                if (e.target.files && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        avatarPreview.innerHTML = `<img src="${event.target.result}" alt="Preview">`;
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
            });
        });
    </script>
</body>
</html>
