<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi Danh - Lưu Bút Thanh Xuân</title>
    <link href="https://fonts.googleapis.com/css2?family=Pattaya&family=Quicksand:wght@300;500;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="sakura-container"></div>
    <div class="film-grain"></div>

    <main class="hero-soft" style="min-height: 100vh;">
        <!-- Login Section -->
        <div id="auth-portal" class="hero-content">
            <h1 class="title-modern">Lời Chào <br><span style="opacity: 0.6;">Ngày Gặp Lại</span></h1>
            <p class="subtitle-modern">Cậu đăng nhập bằng Google để chúng mình cùng viết lưu bút nhé!</p>
            <button id="login-btn" class="google-btn soft-card">
                <i data-lucide="log-in"></i>
                <span style="margin-left: 15px;">Kết nối với bạn bè</span>
            </button>
        </div>

        <!-- Registration/Edit Form -->
        <div id="reg-section" style="display: none; width: 100%; max-width: 800px; padding: 20px;">
            <div class="soft-card" style="padding: 40px; border-radius: 40px;">
                <h2 class="title-modern" style="font-size: 2.5rem; margin-bottom: 10px;">Một Chút Về Tớ</h2>
                <p class="handwritten" style="font-size: 1.2rem; color: var(--sakura-deep); margin-bottom: 30px;">Cậu có thể thay đổi những dòng này bất cứ lúc nào tâm đắc hơn...</p>
                
                <form id="reg-form" class="soft-form">
                    <div class="image-upload-wrapper">
                        <label for="avatar-input" class="avatar-label">
                            <div id="avatar-preview">📸 Chọn tấm ảnh xinh nhất</div>
                        </label>
                        <input type="file" id="avatar-input" hidden accept="image/*">
                    </div>
                    <div class="input-grid">
                        <div class="form-group">
                            <label class="handwritten" style="font-size: 1.1rem;">Tên thân mật của cậu</label>
                            <input type="text" id="reg-name" placeholder="Ví dụ: Alex hay cười" required>
                        </div>
                        <div class="form-group">
                            <label class="handwritten" style="font-size: 1.1rem;">Tính cách nổi bật</label>
                            <input type="text" id="reg-personality" placeholder="Vui tính, trầm mặc, hay quên..." required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="handwritten" style="font-size: 1.1rem;">Những điều cậu đã làm được (tự hào nhất)</label>
                        <textarea id="reg-achievements" placeholder="Tốt nghiệp loại giỏi, đi phượt xuyên Việt..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label class="handwritten" style="font-size: 1.1rem;">Lời nhắn gửi đến cả lớp mình</label>
                        <input type="text" id="reg-quote" placeholder="Thanh xuân này thật đẹp vì có các cậu..." required>
                    </div>
                    <div class="form-group">
                        <label class="handwritten" style="font-size: 1.1rem;">Kỷ niệm thầm kín (chỉ cậu mới biết)</label>
                        <textarea id="reg-secret" placeholder="Lần đó tớ lén ngủ gật trong giờ lịch sử..." required></textarea>
                    </div>
                    <div style="display: flex; gap: 20px;">
                        <button type="submit" id="reg-submit" class="submit-btn" style="flex: 1;">LƯU LẠI KỶ NIỆM</button>
                        <a href="myclass.html" id="view-class-btn" class="submit-btn" style="flex: 1; background: var(--sakura-deep); text-decoration: none; text-align: center; display: none;">XEM TRANG LỚP MÌNH</a>
                    </div>
                </form>
            </div>
            <button id="logout-btn" class="handwritten" style="margin-top: 20px; background: none; border: none; cursor: pointer; opacity: 0.5; font-size: 1.1rem;">Tạm biệt một lát (Đăng xuất)</button>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/firebase-init.js"></script>
    <script src="assets/js/app-sign.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
