<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp Chúng Mình - Thanh Xuân 2026</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="sakura-container"></div>
    <div class="film-grain"></div>

    <!-- VINYL MUSIC PLAYER -->
    <div class="vinyl-player">
        <div id="vinyl-disc" class="vinyl-disc">
            <div class="vinyl-center"></div>
        </div>
        <div style="line-height: 1.2;">
            <div style="font-size: 0.8rem; font-weight: 700; font-family: var(--font-title);">Giai Điệu Năm Ấy</div>
            <div id="music-status" style="font-size: 0.6rem; opacity: 0.6;">Nhấn để phát nhạc...</div>
        </div>
        <button id="toggle-music" style="background:none; border:none; cursor:pointer;">
            <i data-lucide="play" id="music-icon-ui"></i>
        </button>
        <audio id="bg-audio" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="indie-container">
        <!-- NÚT ĐIỀU HƯỚNG CỐ ĐỊNH -->
        <a href="sign.html" class="btn-scrapbook" style="position: fixed; top: 30px; left: 30px; z-index: 1000;">
            <i data-lucide="edit-3"></i>
            <span>GÓC CỦA TỚ</span>
        </a>

        <!-- ĐẦU TRANG -->
        <header class="section-wrapper" style="min-height: 60vh;">
            <h1 class="title-main">Chúng Ta Của Năm Ấy</h1>
            <p class="subtitle-indie">"Những bông hoa rực rỡ nhất niên khóa 2026"</p>
            <div class="handwritten" style="margin-top: 40px; opacity: 0.6; font-size: 1.5rem;">Cuộn để lật lại từng trang ký niệm... ↓</div>
        </header>

        <!-- GRID DANH SÁCH LỚP (POLAROID STYLE) -->
        <div id="members-grid" class="grid-indie">
            <!-- Nạp bởi app-class.js -->
        </div>

        <!-- BẢNG GHIM NGUYỆN ƯỚC (CORKBOARD) -->
        <section class="section-wrapper" style="text-align: left; align-items: flex-start;">
            <h2 class="title-main" style="font-size: 3.5rem; margin-bottom: 20px;">Bảng Ghim Nguyện Ước</h2>
            <p class="handwritten" style="font-size: 1.4rem; margin-bottom: 30px;">Cậu có thể kéo thả các mảnh giấy để sắp xếp nhé!</p>
            
            <div id="wishes-container" class="corkboard">
                <!-- Lời chúc dạng Sticky Notes nạp tại đây -->
            </div>
            
            <div style="display: flex; gap: 15px; width: 100%; max-width: 600px; padding: 15px; background: white; border: 2px solid #333; border-radius: 5px; box-shadow: 4px 4px 0px #333; margin-top: 40px;">
                <input type="text" id="wish-input" placeholder="Viết một lời nhắn nhỏ..." style="flex: 1; border: none; padding: 0 10px; font-family: inherit; outline: none; border-bottom: 1px dashed #ccc;">
                <button id="send-wish" class="btn-scrapbook" style="padding: 10px 20px;">Gửi đi</button>
            </div>
        </section>

        <!-- KHOẢNH KHẮC TẬP THỂ -->
        <section class="section-wrapper">
            <h2 class="title-main" style="font-size: 4rem;">Mãi Là Bạn Thân</h2>
            <div class="polaroid-card" style="max-width: 1000px; padding: 20px; transform: rotate(-1deg); margin-top: 40px;">
                <div class="washi-tape"></div>
                <img src="https://images.unsplash.com/photo-1523050853063-bd8012fbb230?q=80&w=2070" style="width: 100%; border-radius: 2px; display: block; filter: contrast(1.1);">
                <p class="handwritten" style="text-align: center; font-size: 2.2rem; margin-top: 30px; color: var(--ink-blue);">Hẹn gặp lại ở một đỉnh cao mới!</p>
            </div>
        </section>
    </div>

    <!-- MODAL CHI TIẾT (PROFILE VỚI ẢNH BÌA) -->
    <div id="detail-modal" class="modern-overlay">
        <div id="detail-content-target" class="profile-modal-content">
            <!-- Nạp bởi app-class.js -->
        </div>
    </div>

    <!-- LIBRARIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/firebase-init.js"></script>
    <script src="assets/js/app-class.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
