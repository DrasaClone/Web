<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp Chúng Mình | Ký Ức Trong Veo v3</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
    <script>tailwind = { config: { corePlugins: { preflight: false } } }</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div id="sakura-container"></div>
    <div id="page-overlay" class="fixed inset-0 bg-[#FFFBF0] z-[10000] pointer-events-none opacity-0"></div>
    <div id="trash-bin">🗑️</div>
    <div id="toast-container" class="toast"></div>
    
    <div id="loading-screen" class="fixed inset-0 bg-[#FFFBF0] z-[9999] flex flex-col items-center justify-center">
        <h1 class="font-heading italic text-5xl text-[#3E2723]">Gợi lại những thước phim...</h1>
        <div class="mt-6 w-48 h-[2px] bg-[#3E2723]/10 overflow-hidden rounded-full">
            <div id="loading-bar" class="w-full h-full bg-[#FF8AB8] origin-left scale-x-0"></div>
        </div>
    </div>

    <div id="app" class="opacity-0"></div>

    <template id="class-template">
        <div class="min-h-screen p-6 md:p-12 flex flex-col items-center">
            <div class="w-full max-w-6xl flex justify-between items-center mb-12">
                <div class="flex items-center gap-3">
                    <a href="main.html" class="liquid-glass inline-flex items-center gap-2 px-5 py-3 rounded-full hover:bg-white/50 transition-all cursor-pointer text-brown">
                        <span class="font-heading text-sm">← Về sảnh chính</span>
                    </a>
                    <button id="dark-mode-toggle" class="liquid-glass w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/50 transition-all text-lg" title="Chuyển giao diện">🌙</button>
                </div>
                <div id="user-info" class="flex items-center gap-4"></div>
            </div>

            <div id="edit-profile-section" class="w-full max-w-4xl mb-12 hidden">
                <div class="liquid-glass p-8 flex flex-col md:flex-row gap-8">
                    <div class="flex-1 flex flex-col gap-4">
                        <h3 class="font-heading text-3xl text-[#3E2723]">Dấu ấn cá nhân</h3>
                        <div class="flex items-center gap-4">
                            <div id="avatar-preview" class="w-16 h-16 rounded-full bg-[#5D4037]/10 flex-shrink-0 overflow-hidden border-2 border-[#5D4037]/10">
                                <img id="avatar-img" src="" class="w-full h-full object-cover">
                            </div>
                            <button id="edit-avatar-btn" class="text-sm font-bold text-[#FF8AB8] hover:scale-105 transition-all">Đổi ảnh đại diện 📸</button>
                            <input type="file" id="avatar-input" accept="image/*" class="hidden">
                        </div>
                        <input type="text" id="edit-nick" placeholder="Biệt danh/Tên gọi thân mật..." class="bg-white/40 rounded-full px-6 py-3 outline-none font-body">
                        <textarea id="edit-bio" placeholder="Lời nhắn gửi cho lớp mình..." class="bg-white/40 rounded-2xl px-6 py-4 outline-none font-body h-32 resize-none"></textarea>
                        
                        <!-- 👤 Birthday & Age -->
                        <label class="text-xs font-bold text-muted/60 uppercase tracking-widest">Ngày sinh của bạn</label>
                        <input type="date" id="edit-birthdate" class="bg-white/40 rounded-full px-6 py-3 outline-none font-body text-muted">
                        
                        <!-- 🏆 Wildcard Settings -->
                        <label class="text-xs font-bold text-muted/60 uppercase tracking-widest mt-2">🏆 Wildcard — Số áo của bạn</label>
                        <input type="number" id="edit-jersey" min="0" max="99" placeholder="Số áo (0-99)..." class="bg-white/40 rounded-full px-6 py-3 outline-none font-body">
                        
                        <label class="text-xs font-bold text-muted/60 uppercase tracking-widest">Màu sắc Wildcard</label>
                        <div id="wildcard-color-picker" class="flex flex-wrap gap-3">
                            <button data-color="pink" class="w-9 h-9 rounded-full border-2 border-transparent transition-all hover:scale-110" style="background:#FF8AB8" title="Hồng"></button>
                            <button data-color="mint" class="w-9 h-9 rounded-full border-2 border-transparent transition-all hover:scale-110" style="background:#A5D6A7" title="Bạc hà"></button>
                            <button data-color="blue" class="w-9 h-9 rounded-full border-2 border-transparent transition-all hover:scale-110" style="background:#81D4FA" title="Xanh dương"></button>
                            <button data-color="purple" class="w-9 h-9 rounded-full border-2 border-transparent transition-all hover:scale-110" style="background:#CE93D8" title="Tím"></button>
                            <button data-color="gold" class="w-9 h-9 rounded-full border-2 border-transparent transition-all hover:scale-110" style="background:#FFD54F" title="Vàng"></button>
                            <button data-color="coral" class="w-9 h-9 rounded-full border-2 border-transparent transition-all hover:scale-110" style="background:#FFAB91" title="San hô"></button>
                            <button data-color="lavender" class="w-9 h-9 rounded-full border-2 border-transparent transition-all hover:scale-110" style="background:#B39DDB" title="Oải hương"></button>
                            <button data-color="rainbow" class="w-9 h-9 rounded-full border-2 border-transparent transition-all hover:scale-110" style="background:linear-gradient(135deg,#FF8AB8,#FFD54F,#A5D6A7,#81D4FA,#CE93D8)" title="Cầu vồng"></button>
                        </div>
                    </div>
                    <div class="flex-1 flex flex-col gap-4">
                        <input type="text" id="edit-music-name" placeholder="Giai điệu thanh xuân (Tên bài hát)..." class="bg-white/40 rounded-full px-6 py-3 outline-none font-body">
                        <input type="text" id="edit-music-url" placeholder="Link nhạc (YouTube/Spotify/.mp3)..." class="bg-white/40 rounded-full px-6 py-3 outline-none font-body">
                        
                        <!-- 🔗 Social Links -->
                        <label class="text-xs font-bold text-muted/60 uppercase tracking-widest mt-2">🔗 Liên kết mạng xã hội</label>
                        <div class="flex flex-wrap gap-2">
                            <input type="text" id="edit-social-fb" placeholder="Facebook URL..." class="flex-1 min-w-[120px] bg-white/40 rounded-full px-4 py-2 outline-none font-body text-sm">
                            <input type="text" id="edit-social-ig" placeholder="Instagram..." class="flex-1 min-w-[120px] bg-white/40 rounded-full px-4 py-2 outline-none font-body text-sm">
                            <input type="text" id="edit-social-tt" placeholder="TikTok..." class="flex-1 min-w-[120px] bg-white/40 rounded-full px-4 py-2 outline-none font-body text-sm">
                            <input type="text" id="edit-social-yt" placeholder="YouTube..." class="flex-1 min-w-[120px] bg-white/40 rounded-full px-4 py-2 outline-none font-body text-sm">
                            <input type="text" id="edit-social-gh" placeholder="GitHub..." class="flex-1 min-w-[120px] bg-white/40 rounded-full px-4 py-2 outline-none font-body text-sm">
                            <input type="text" id="edit-social-za" placeholder="Zalo..." class="flex-1 min-w-[120px] bg-white/40 rounded-full px-4 py-2 outline-none font-body text-sm">
                        </div>
                        
                        <!-- 🧠 Quiz: Câu hỏi về bạn -->
                        <label class="text-xs font-bold text-muted/60 uppercase tracking-widest mt-2">🧠 Câu hỏi "Hiểu sự an ý"</label>
                        <div id="quiz-questions-edit" class="flex flex-col gap-3">
                            <!-- Generated dynamically -->
                        </div>
                        <button id="add-question-btn" class="text-sm font-bold text-[#81D4FA] hover:scale-105 transition-all self-start">+ Thêm câu hỏi</button>
                        
                        <button id="save-profile-btn" class="mt-auto bg-[#FF8AB8] text-white px-10 py-4 rounded-full font-heading text-xl hover:scale-105 transition-all">Ghi danh vĩnh viễn ✨</button>
                    </div>
                </div>
            </div>

            <h1 class="font-heading text-8xl mb-4 text-center text-[#3E2723]">Những Mảnh Ký Ức</h1>
            <p class="font-handwriting text-2xl mb-12 opacity-80 italic">"Nơi thời gian ngừng lại..."</p>
            
            <!-- SCRAPBOOK ALBUM -->
            <div id="scrapbook-board" class="scrapbook-board relative w-full min-h-[600px] liquid-glass p-12 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-10">
                <!-- Polaroid cards load here -->
            </div>

            <!-- MEMORY WALL (MULTI-MODAL) -->
            <div class="w-full max-w-6xl mt-24">
                <h2 class="font-heading text-5xl mb-12 text-center text-[#3E2723]">Bức Tường Thanh Xuân</h2>
                <div id="memory-wall" class="flex flex-wrap gap-8 items-start justify-center min-h-[400px]">
                    <!-- Realtime multi-modal memories -->
                </div>
            </div>

            <!-- 🏆 WILDCARD GALLERY -->
            <div class="w-full max-w-6xl mt-24" id="wildcard-section">
                <h2 class="font-heading text-5xl mb-4 text-center text-[#3E2723]">🏆 Bộ Sưu Tập Wildcard</h2>
                <p class="font-handwriting text-lg text-center text-muted/50 mb-10">"Mỗi người một màu, một con số — cùng nhau tạo nên đội hình thanh xuân"</p>
                <div id="wildcard-gallery" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
                    <!-- Wildcard cards render here -->
                </div>
            </div>

            <!-- SHARED MOMENTS (ALBUM) -->
            <div class="w-full max-w-6xl mt-24">
                <h2 class="font-heading text-5xl mb-12 text-center text-[#3E2723]">Album Kỷ Niệm</h2>
                <div class="flex justify-end mb-6">
                    <button id="upload-moment" class="liquid-glass px-8 py-4 rounded-full hover:bg-white/50 transition-all text-[#3E2723] font-heading text-lg flex items-center gap-3">
                        <span>📸</span> Thêm ảnh kỷ niệm
                    </button>
                </div>
                <div id="shared-moments" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 min-h-[200px]">
                    <!-- Photos load here -->
                </div>
            </div>

            <!-- 🧠 QUIZ LEADERBOARD -->
            <div class="w-full max-w-6xl mt-24" id="quiz-section">
                <h2 class="font-heading text-5xl mb-4 text-center text-[#3E2723]">🧠 Hiểu Sự An Ý</h2>
                <p class="font-handwriting text-lg text-center text-muted/50 mb-10">"Trả lời câu hỏi của nhau — xem ai hiểu bạn nhất!"</p>
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Left: Member selector + Quiz -->
                    <div class="lg:col-span-2 liquid-glass p-8">
                        <div class="flex items-center gap-4 mb-6">
                            <label class="font-heading text-lg text-muted">Chọn người để quiz:</label>
                            <select id="quiz-target-select" class="bg-white/40 rounded-full px-5 py-2 outline-none font-body text-muted flex-1">
                                <option value="">— Chọn thành viên —</option>
                            </select>
                        </div>
                        <div id="quiz-area" class="min-h-[200px]">
                            <p class="font-body text-muted/50 italic text-center py-12">Chọn một thành viên để bắt đầu quiz! 🌟</p>
                        </div>
                    </div>
                    
                    <!-- Right: Leaderboard -->
                    <div class="liquid-glass p-8">
                        <h3 class="font-heading text-2xl text-center text-muted mb-6">🏆 Bảng Xếp Hạng</h3>
                        <div id="quiz-leaderboard" class="flex flex-col gap-3">
                            <p class="font-body text-muted/40 italic text-center py-8">Chưa có dữ liệu...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- MULTI-MODAL INPUTS -->
            <div class="w-full max-w-2xl mt-16 liquid-glass p-8 flex flex-col gap-6">
                <div class="flex justify-between items-center">
                    <h3 class="font-heading text-2xl text-[#3E2723]">Để lại kỷ niệm</h3>
                    <div class="flex gap-2" id="input-selector" role="tablist" aria-label="Chọn loại kỷ niệm">
                        <button data-type="text" class="p-2 rounded-lg bg-[#FF8AB8]/20 text-xl" title="Ghi chú" role="tab" aria-selected="true" aria-label="Viết ghi chú">📝</button>
                        <button data-type="photo" class="p-2 rounded-lg hover:bg-[#A5D6A7]/20 text-xl" title="Ghim ảnh" role="tab" aria-selected="false" aria-label="Ghim ảnh kỷ niệm">🖼️</button>
                        <button data-type="voice" class="p-2 rounded-lg hover:bg-blue-200/20 text-xl" title="Giọng nói" role="tab" aria-selected="false" aria-label="Gửi giọng nói">🎙️</button>
                    </div>
                </div>
                <div id="dynamic-input-area" class="flex flex-col gap-4">
                    <input type="text" id="memory-input" placeholder="Viết gì đó thật tâm trạng..." class="bg-white/40 rounded-full px-6 py-3 outline-none font-body text-[#3E2723]">
                    <button id="send-memory" class="bg-[#FF8AB8] text-white px-8 py-3 rounded-full font-heading italic hover:bg-[#ff70a6] transition-all">Gửi lời nhắn</button>
                </div>
            </div>

            <!-- 📰 GLOBAL FEED -->
            <div class="w-full max-w-6xl mt-24" id="global-feed-section">
                <h2 class="font-heading text-5xl mb-4 text-center text-[#3E2723]">📰 Bảng Tin Lớp</h2>
                <p class="font-handwriting text-lg text-center text-muted/50 mb-10">"Cập nhật những khoảnh khắc mới nhất từ mọi người"</p>
                
                <div class="flex items-center justify-between mb-8">
                    <!-- Sort Tabs -->
                    <div class="flex gap-2" id="feed-sort-tabs">
                        <button data-sort="time" class="feed-sort-btn active px-5 py-2 rounded-full bg-[#FF8AB8]/20 text-sm font-bold text-muted hover:bg-[#FF8AB8]/30 transition-all">⏰ Mới nhất</button>
                        <button data-sort="hot" class="feed-sort-btn px-5 py-2 rounded-full bg-white/30 text-sm font-bold text-muted hover:bg-[#FF8AB8]/10 transition-all">🔥 Nổi bật</button>
                    </div>
                    <!-- New Status Button (if logged in) -->
                    <button id="new-status-btn" class="px-6 py-2 rounded-full bg-gradient-to-r from-[#FF8AB8] to-[#A5D6A7] text-white text-sm font-bold hover:scale-105 transition-all hidden">+ Đăng ảnh</button>
                </div>
                
                <div id="global-feed" class="flex flex-col gap-6 min-h-[300px]">
                    <p class="font-body text-muted/40 italic text-center py-16">Chưa có bài viết nào...</p>
                </div>
            </div>

            <!-- 🎙️ AGORA MEETING ROOM -->
            <div id="agora-room-container" class="fixed bottom-6 left-6 z-[9000]">
                <button id="agora-toggle-btn" class="liquid-glass w-14 h-14 rounded-full flex items-center justify-center text-2xl hover:scale-110 transition-all shadow-xl border-[#FF8AB8]/20" title="Phòng gặp nhau online">
                    🎙️
                </button>
                <div id="agora-room-panel" class="hidden absolute bottom-16 left-0 liquid-glass p-5 w-80 md:w-96 border-[#FF8AB8]/20">
                    <div class="flex items-center justify-between mb-4">
                        <h4 class="font-heading text-lg text-[#3E2723]">🎙️ Phòng Gặp Nhau</h4>
                        <span id="agora-participant-count" class="text-xs font-body text-muted/50 bg-white/30 px-3 py-1 rounded-full">0 người</span>
                    </div>
                    <div id="agora-local-player" class="w-full aspect-video bg-[#3E2723]/10 rounded-xl mb-3 flex items-center justify-center text-muted/30 text-sm">
                        📹 Đang kết nối...
                    </div>
                    <div id="agora-remote-players" class="flex flex-col gap-2 max-h-[160px] overflow-y-auto">
                        <!-- Remote participants appear here -->
                    </div>
                    <div class="flex gap-2 mt-3">
                        <button id="agora-join-btn" class="flex-1 px-4 py-2 rounded-full bg-[#FF8AB8] text-white text-sm font-bold hover:bg-[#e87fa8] transition-all">Vào phòng 📞</button>
                        <button id="agora-leave-btn" class="flex-1 px-4 py-2 rounded-full bg-[#FF5757]/20 text-[#FF5757] text-sm font-bold hover:bg-[#FF5757]/30 transition-all hidden">Rời phòng</button>
                    </div>
                    <p class="text-[10px] text-muted/30 mt-3 text-center">✨ Gặp gỡ tình cờ — ai đó cũng đang online!</p>
                </div>
            </div>

            <!-- STICKER TRAY -->
            <div class="liquid-glass fixed bottom-10 right-10 p-6 flex gap-4 z-50 shadow-2xl border-white/40">
                <div class="sticker-item text-4xl">🌸</div>
                <div class="sticker-item text-4xl">✨</div>
                <div class="sticker-item text-4xl">💖</div>
                <div class="sticker-item text-4xl">🍭</div>
                <div class="sticker-item text-4xl">🎨</div>
            </div>
        </div>
    </template>

    <template id="profile-template">
        <div id="profile-modal" class="fixed inset-0 z-[11000] flex items-center justify-center p-2 md:p-4 opacity-0 pointer-events-none">
            <div class="absolute inset-0 bg-[#3E2723]/30 backdrop-blur-xl transition-opacity duration-500 modal-bg"></div>
            <div class="liquid-glass w-full max-w-3xl max-h-[95vh] overflow-y-auto relative z-10 p-6 md:p-10 border-white/30 profile-modal-content">
                <button id="close-profile" class="absolute top-4 right-4 text-3xl text-[#3E2723]/40 hover:text-[#3E2723] transition-all z-20">✕</button>
                
                <!-- ═══ COVER HEADER ═══ -->
                <div class="profile-cover flex flex-col md:flex-row gap-6 md:gap-8 mb-8 pb-8 border-b border-[#3E2723]/10">
                    <!-- Avatar -->
                    <div class="flex flex-col items-center md:items-start gap-4 flex-shrink-0">
                        <div class="relative w-28 h-28 md:w-36 md:h-36">
                            <div class="absolute inset-[-6px] rounded-full border-2 border-dashed border-[#FF8AB8]/30 animate-[spin_30s_linear_infinite]"></div>
                            <img id="profile-vinyl-img" src="" class="w-full h-full rounded-full object-cover shadow-lg border-4 border-white">
                        </div>
                        <div id="profile-wildcard" class="hidden w-10 h-10 rounded-full items-center justify-center text-white font-bold font-heading text-sm shadow-lg" style="background:linear-gradient(135deg,#FF8AB8,#A5D6A7)"></div>
                    </div>
                    
                    <!-- Info -->
                    <div class="flex-1 min-w-0">
                        <h2 id="profile-name" class="font-heading text-4xl md:text-5xl text-[#3E2723] mb-1"></h2>
                        <p id="profile-nick" class="font-handwriting text-lg md:text-xl opacity-80 mb-2"></p>
                        <p id="profile-age" class="font-body text-sm text-muted/60 mb-3"></p>
                        <p id="profile-bio" class="font-body text-base text-muted/80 leading-relaxed italic mb-4"></p>
                        
                        <!-- 🔗 Social Links -->
                        <div id="profile-social-links" class="flex flex-wrap gap-3"></div>
                        
                        <!-- 🎵 Music -->
                        <div class="mt-4 flex items-center gap-4 bg-[#FF8AB8]/5 rounded-full px-5 py-3 border border-[#FF8AB8]/10">
                            <button id="play-private-music" class="text-3xl hover:scale-110 transition-transform active:scale-95 flex-shrink-0">▶️</button>
                            <div class="flex-1 min-w-0">
                                <p id="music-name" class="font-bold text-sm text-[#3E2723] truncate"></p>
                                <div id="music-type-badge" class="text-[10px] text-muted/40 mt-0.5"></div>
                                <div class="w-full h-1 bg-[#3E2723]/10 mt-2 rounded-full overflow-hidden">
                                    <div id="music-progress" class="w-0 h-full bg-[#FF8AB8]"></div>
                                </div>
                            </div>
                        </div>
                        <!-- Music embed container (for YouTube/Spotify/SoundCloud) -->
                        <div id="music-embed-container" class="mt-3 rounded-xl overflow-hidden hidden" style="max-height:200px;"></div>
                    </div>
                </div>

                <!-- ═══ STATUS FEED ═══ -->
                <div class="mb-4">
                    <h4 class="font-heading text-xl text-[#3E2723] mb-4 flex items-center gap-2">
                        📝 Bài viết
                        <span id="profile-status-count" class="text-sm font-body text-muted/40"></span>
                    </h4>
                    <div id="profile-status-feed" class="flex flex-col gap-4">
                        <p class="font-body text-muted/40 italic text-center py-8">Đang tải...</p>
                    </div>
                </div>

                <!-- ═══ PERSONAL MOMENTS ═══ -->
                <div class="mt-6">
                    <h4 class="font-heading text-xl text-[#3E2723] mb-4">📸 Kỷ niệm</h4>
                    <div id="personal-moments" class="grid grid-cols-3 gap-3">
                        <p class="col-span-full font-body text-muted/40 italic text-center py-4">Chưa có kỷ niệm...</p>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
    <script type="module" src="assets/js/agora-room.js"></script>
    <script type="module" src="assets/js/loading.js"></script>
    <script type="module" src="assets/js/class.js?v=2"></script>
</body>
</html>
