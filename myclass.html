<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp Chúng Mình - Thanh Xuân 2026</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-class bg-fixed-layer">
    <div id="sakura-container"></div>

    <div class="indie-container">
        <header class="section-wrapper" style="min-height: 80vh;">
            <a href="sign.html" class="btn-indie" style="position: fixed; top: 30px; left: 30px; z-index: 1000; padding: 10px 25px; font-size: 1rem;">
                <i data-lucide="edit-3"></i>
                <span>GÓC CỦA TỚ</span>
            </a>
            
            <h1 class="title-indie">Chúng Ta Của Năm Ấy</h1>
            <p class="subtitle-indie">"Những bông hoa rực rỡ nhất niên khóa 2026"</p>
            <div class="handwritten" style="margin-top: 40px; opacity: 0.6; font-size: 1.5rem;">Cùng tớ lật giở từng trang kỷ niệm nhé ↓</div>
        </header>

        <div id="members-grid" class="grid-indie"></div>

        <section class="section-wrapper" style="background: var(--sunny-yellow); border-radius: 60px 60px 0 0; border: 2px solid var(--text-human); margin: 0 -20px;">
            <h2 class="title-indie">Vì Sao Nguyện Ước</h2>
            <p class="handwritten" style="font-size: 1.4rem;">Gửi một lời nhắn cho tương lai nhé...</p>
            <div id="wishes-container" style="height: 400px; width: 100%; position: relative; overflow: hidden; margin: 40px 0;"></div>
            <div style="display: flex; gap: 15px; width: 100%; max-width: 600px; padding: 10px; background: white; border: 2px solid var(--text-human); border-radius: 50px; box-shadow: 5px 5px 0px var(--text-human);">
                <input type="text" id="wish-input" placeholder="Viết gì đó thật xinh..." style="flex: 1; border: none; padding: 0 20px; font-family: inherit; outline: none;">
                <button id="send-wish" style="background: var(--sakura-pink); border: none; width: 50px; height: 50px; border-radius: 50%; color: white; cursor: pointer;">
                    <i data-lucide="send"></i>
                </button>
            </div>
        </section>

        <section class="section-wrapper">
            <h2 class="title-indie">Mãi Là Bạn Thân</h2>
            <div style="width: 100%; max-width: 1000px; background: white; padding: 20px; border: 2px solid var(--text-human); transform: rotate(-1deg); box-shadow: 15px 15px 0px var(--sky-blue); margin-top: 40px;">
                <img src="https://images.unsplash.com/photo-1523050853063-bd8012fbb230?q=80&w=2070" style="width: 100%; border-radius: 2px; display: block;">
                <p class="handwritten" style="text-align: center; font-size: 2rem; margin-top: 25px; color: var(--ink-blue);">Hẹn gặp lại ở một đỉnh cao mới!</p>
            </div>
        </section>
    </div>

    <div id="detail-modal" class="modern-overlay" style="display: none; background: rgba(255,252,249,0.98);">
        <div class="modal-indie">
            <button class="close-modal" style="position: absolute; top: 20px; right: 20px; background: none; border: none; cursor: pointer;">
                <i data-lucide="x" style="width: 30px; height: 30px; color: var(--text-human);"></i>
            </button>
            <div id="detail-content-target"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/firebase-init.js"></script>
    <script src="assets/js/app-class.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
