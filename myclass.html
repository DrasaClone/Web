<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp Chúng Mình | Cinematic Ký Ức</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div id="page-overlay" class="fixed inset-0 bg-[#FFFBF0] z-[10000] pointer-events-none opacity-0"></div>
    
    <div id="loading-screen" class="fixed inset-0 bg-[#FFFBF0] z-[9999] flex flex-col items-center justify-center">
        <h1 class="font-heading italic text-5xl text-[#5D4037]">Đang mở lại ký ức...</h1>
        <div class="mt-6 w-48 h-[2px] bg-[#5D4037]/10 overflow-hidden rounded-full">
            <div id="loading-bar" class="w-full h-full bg-[#FF8AB8] origin-left scale-x-0"></div>
        </div>
    </div>

    <div id="app" class="opacity-0"></div>

    <template id="class-template">
        <div class="min-h-screen p-8 md:p-16 flex flex-col items-center">
            <div class="w-full max-w-6xl flex justify-between items-center mb-12">
                <a href="main.html" class="liquid-glass inline-flex items-center gap-3 px-8 py-4 rounded-full hover:bg-white/10 transition-all cursor-pointer text-[#5D4037]">
                    <span class="font-heading text-lg">Về sảnh chính</span>
                </a>
                <div id="user-info" class="flex items-center gap-4"></div>
            </div>

            <h1 class="font-heading text-7xl mb-12 text-center text-[#5D4037]">Bảng Lưu Bút</h1>
            
            <!-- BẢN ẢNH THÀNH VIÊN -->
            <div id="scrapbook-board" class="scrapbook-board relative w-full min-h-[600px] liquid-glass p-10 border-[#5D4037]/10 shadow-inner grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
                <!-- Thẻ học sinh render ở đây -->
            </div>

            <!-- BỨC TƯỜNG KỶ NIỆM (TÁCH BIỆT) -->
            <div class="w-full max-w-6xl mt-20">
                <h2 class="font-heading text-5xl mb-8 text-center text-[#5D4037]">Những lời nhắn gửi</h2>
                <div id="memory-wall" class="flex flex-wrap gap-6 items-start justify-center">
                    <!-- Lời nhắn Realtime hiện ở đây -->
                </div>
            </div>

            <!-- TIME CAPSULE INPUT -->
            <div class="w-full max-w-2xl mt-12 liquid-glass p-8 flex flex-col gap-4">
                <h3 class="font-heading text-2xl text-[#5D4037]">Gửi gắm ký ức</h3>
                <div class="flex gap-4">
                    <input type="text" id="memory-input" placeholder="Viết gì đó thật xinh..." class="flex-1 bg-white/30 border-none rounded-full px-6 py-3 outline-none font-body text-[#5D4037]">
                    <button id="send-memory" class="bg-[#FF8AB8] text-white px-8 py-3 rounded-full font-heading italic hover:bg-[#ff70a6] transition-all">Gửi</button>
                </div>
            </div>

            <!-- STICKER TRAY -->
            <div class="liquid-glass fixed bottom-10 right-10 p-6 flex gap-4 z-50 shadow-lg border-[#FF8AB8]/20">
                <div class="sticker-item text-4xl cursor-grab transition-transform hover:scale-125">🌸</div>
                <div class="sticker-item text-4xl cursor-grab transition-transform hover:scale-125">✨</div>
                <div class="sticker-item text-4xl cursor-grab transition-transform hover:scale-125">💖</div>
                <div class="sticker-item text-4xl cursor-grab transition-transform hover:scale-125">🍭</div>
            </div>
        </div>
    </template>

    <script type="module" src="assets/js/class.js"></script>
</body>
</html>
