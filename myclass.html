<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp Chúng Mình - Thanh Xuân 2026</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-class bg-fixed-layer">
    <div id="sakura-container"></div>
    <div class="film-grain"></div>

    <!-- VINYL MUSIC PLAYER -->
    <div class="vinyl-player">
        <div id="vinyl-disc" class="vinyl-disc">
            <div class="vinyl-center"></div>
        </div>
        <div style="line-height: 1.2;">
            <div style="font-size: 0.75rem; font-weight: 700; font-family: var(--font-display); color: var(--primary);">Giai Điệu Năm Ấy</div>
            <div id="music-status" style="font-size: 0.6rem; opacity: 0.6; color: var(--secondary);">Nhấn để phát nhạc...</div>
        </div>
        <button id="toggle-music" style="background:none; border:none; cursor:pointer;">
            <i data-lucide="play" id="music-icon-ui" style="width:20px; color: var(--tertiary);"></i>
        </button>
        <audio id="bg-audio" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="indie-container">
        <a href="sign.html" class="btn-indie" style="position: fixed; top: 24px; left: 24px; z-index: 1000; padding: 10px 20px; font-size: 0.8rem; min-width: auto; height: auto;">
            <i data-lucide="edit-3" size="16"></i>
            <span>GÓC CỦA TỚ</span>
        </a>

        <header class="section-wrapper">
            <h1 class="title-main" style="font-family: var(--font-display); font-weight: 600;">Chúng Ta Của Năm Ấy</h1>
            <p class="handwritten" style="font-size: 2rem; color: var(--primary);">"Những bông hoa rực rỡ nhất niên khóa 2026"</p>
            <div class="handwritten" style="margin-top: 40px; opacity: 0.6; font-size: 1.5rem; color: var(--primary);">Cuộn để lật lại từng trang ký niệm... ↓</div>
        </header>

        <div id="members-grid" class="grid-indie"></div>

        <section class="wish-section">
            <h2 class="title-main" style="font-size: 3.5rem; margin-bottom: 20px; font-family: var(--font-display); font-weight: 600;">Bảng Nguyện Ước</h2>
            <p class="handwritten" style="font-size: 1.4rem; margin-bottom: 30px; color: var(--primary);">Cậu có thể kéo thả để sắp xếp nhé!</p>
            <div id="wishes-container" class="corkboard"></div>
            <div class="wish-input-group" style="margin-top:40px;">
                <input type="text" id="wish-input" placeholder="Viết gì đó thật xinh...">
                <button id="send-wish"><i data-lucide="send"></i></button>
            </div>
        </section>

        <section class="section-wrapper">
            <h2 class="title-main" style="font-size: 4rem; font-family: var(--font-display); font-weight: 600;">Mãi Là Bạn Thân</h2>
            <div class="polaroid-card" style="max-width: 800px; padding: 16px; transform: rotate(-1deg); margin: 40px auto; border-radius: var(--radius-sm);">
                <div class="washi-tape" style="background: rgba(158, 130, 181, 0.3);"></div>
                <img src="https://images.unsplash.com/photo-1523050853063-bd8012fbb230?q=80&w=2070" style="width: 100%; border-radius: 4px; display: block; filter: contrast(1.05) saturate(0.9);">
                <p class="handwritten" style="text-align: center; font-size: 2.2rem; margin-top: 32px; color: var(--primary);">Hẹn gặp lại ở một đỉnh cao mới!</p>
            </div>
        </section>
    </div>

    <div id="detail-modal" class="modern-overlay">
        <div id="detail-content-target" class="profile-modal-content"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/firebase-init.js"></script>
    <script src="assets/js/app-class.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
