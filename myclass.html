<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp Chúng Mình | Cinematic Ký Ức</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
    
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { background: #000; margin: 0; cursor: none; }
        #cursor {
            width: 20px; height: 20px; background: rgba(255,255,255,0.5); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999; mix-blend-mode: difference;
        }
    </style>
</head>
<body class="bg-black">
    <div id="cursor"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useRef } = React;
        const stickers = ['🌸', '✨', '💖', '🍬', '🍡', '🍭', '🎨', '🧸', '🐱', '🌈', '🍓', '🍀'];

        const ClassApp = () => {
            const trayRef = useRef(null);

            useEffect(() => {
                const cursor = document.getElementById('cursor');
                window.addEventListener('mousemove', (e) => {
                    gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.2, ease: "power2.out" });
                });

                // Sticker Draggable Logic
                document.querySelectorAll('.sticker-item').forEach(item => {
                    Draggable.create(item, {
                        type: "x,y",
                        onDragEnd: function() {
                            confetti({
                                particleCount: 30,
                                spread: 50,
                                origin: { x: this.pointerX / window.innerWidth, y: this.pointerY / window.innerHeight },
                                colors: ['#FF8AB8', '#F2C94C']
                            });
                            gsap.to(this.target, { x: 0, y: 0, duration: 0.5, ease: "elastic.out(1, 0.5)" });
                        }
                    });
                });
            }, []);

            return (
                <div className="min-h-screen p-16">
                    {/* NAV */}
                    <a href="main.html" className="liquid-glass inline-flex items-center gap-3 px-8 py-4 rounded-full mb-16 hover:bg-white/10 transition-all">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                        <span className="font-heading italic">Về sảnh chính</span>
                    </a>

                    <h1 className="font-heading italic text-8xl mb-24 text-center">Chúng Ta Của Năm Ấy</h1>

                    {/* GRID */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-12 mb-24">
                        {[1, 2, 3].map((i) => (
                            <div key={i} className="member-card liquid-glass rounded-[2rem] p-8 aspect-[3/4] flex flex-col justify-end border border-white/5 hover:border-white/20 transition-all hover:scale-[1.02]">
                                <h3 className="font-heading italic text-3xl">Tên Bạn {i}</h3>
                                <p className="font-body text-white/50">"Một câu nói hay để đời..."</p>
                            </div>
                        ))}
                    </div>

                    {/* STICKER TRAY */}
                    <div ref={trayRef} className="liquid-glass-strong fixed bottom-8 right-8 p-6 rounded-[2rem] border border-white/10 w-80">
                        <h3 className="font-heading italic text-xl mb-4 text-center">Khay Sticker</h3>
                        <div className="grid grid-cols-4 gap-4">
                            {stickers.map((s, i) => (
                                <div key={i} className="sticker-item cursor-grab text-3xl p-3 bg-white/5 rounded-2xl hover:bg-white/10 flex items-center justify-center transition-all">
                                    {s}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<ClassApp />);
    </script>
</body>

</html>
