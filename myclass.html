<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp Chúng Mình - Thanh Xuân 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;500;700&family=Nunito:wght@300;400;600;700&family=Sriracha&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --sakura-base: #fffcf9; --sakura-pink: #ff8fab; --sakura-deep: #fb6f92; --sunny-yellow: #fef3c7; --sky-blue: #e0f2fe; --ink-blue: #3b82f6; --text-human: #374151; --paper-shadow: rgba(0, 0, 0, 0.1); --washi-tape: rgba(255, 255, 255, 0.5); --font-title: 'Mali', cursive; --font-body: 'Nunito', sans-serif; --font-hand: 'Sriracha', cursive; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--sakura-base); color: var(--text-human); font-family: var(--font-body); overflow-x: hidden; line-height: 1.6; }
        .bg-fixed-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover !important; background-position: center !important; background-attachment: fixed !important; z-index: -1; }
        .bg-class { background: linear-gradient(rgba(255,252,249,0.7), rgba(255,252,249,0.8)), url('assets/myclass.jpg'); }
        .indie-container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px; position: relative; }
        .section-wrapper { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 80px 0; text-align: center; }
        .title-main { font-family: var(--font-title); font-size: clamp(3rem, 8vw, 5rem); color: var(--sakura-deep); line-height: 1.1; margin-bottom: 20px; }
        .grid-indie { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 40px; padding: 40px 0; width: 100%; }
        .polaroid-card { background: white; padding: 12px 12px 45px 12px; box-shadow: 5px 15px 30px var(--paper-shadow); position: relative; transition: all 0.5s cubic-bezier(0.2, 0, 0.2, 1); cursor: pointer; border: 1px solid #f1f1f1; transform-style: preserve-3d; }
        .card-img-box { width: 100%; aspect-ratio: 4/5; overflow: hidden; background: #eee; }
        .card-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .washi-tape { position: absolute; top: -15px; left: 50%; transform: translateX(-50%) rotate(-2deg); width: 90px; height: 30px; background: var(--washi-tape); backdrop-filter: blur(2px); border: 1px solid rgba(0,0,0,0.05); z-index: 10; }
        .corkboard { background: #e7cba9; background-image: url('https://www.transparenttextures.com/patterns/cork-board.png'); border: 10px solid #8b5e3c; border-radius: 10px; min-height: 500px; position: relative; padding: 40px; box-shadow: inset 0 0 50px rgba(0,0,0,0.2); width: 100%; overflow: hidden; }
        .sticky-note { background: #fff9c4; padding: 15px; width: 200px; min-height: 150px; box-shadow: 5px 5px 15px rgba(0,0,0,0.2); font-family: var(--font-hand); font-size: 1.2rem; cursor: grab; position: absolute; }
        .sticky-note::before { content: '📌'; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); font-size: 1.5rem; }
        .wish-section { background: var(--sunny-yellow); border-radius: 60px 60px 0 0; border-top: 2px solid #333; margin-top: 80px; padding: 80px 20px; }
        .wish-input-group { display: flex; gap: 0; width: 100%; max-width: 600px; margin: 0 auto; background: white; border: 2px solid #333; border-radius: 50px; overflow: hidden; box-shadow: 4px 4px 0px #333; }
        .wish-input-group input { flex: 1; border: none; padding: 0 25px; height: 56px; background: transparent; font-family: inherit; }
        .wish-input-group button { background: var(--sakura-pink); border: none; width: 60px; height: 56px; color: white; cursor: pointer; }
        .btn-scrapbook { font-family: var(--font-title); background: white; color: var(--text-human); border: 2px solid #333; padding: 10px 25px; border-radius: 50px; box-shadow: 4px 4px 0px #333; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; font-size: 1rem; }
        .vinyl-player { position: fixed; bottom: 30px; left: 30px; z-index: 1000; display: flex; align-items: center; gap: 15px; background: white; padding: 10px 20px; border-radius: 100px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid #333; }
        .vinyl-disc { width: 40px; height: 40px; border-radius: 50%; background: #111; display: flex; justify-content: center; align-items: center; animation: spin 4s linear infinite; animation-play-state: paused; border: 2px solid #333; }
        .vinyl-disc.playing { animation-play-state: running; }
        .vinyl-center { width: 12px; height: 12px; background: var(--sakura-pink); border-radius: 50%; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .modern-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 252, 249, 0.95); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .profile-modal-content { background: white; width: 100%; max-width: 900px; max-height: 90vh; overflow-y: auto; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); position: relative; border: 2px solid #333; }
        .profile-cover { width: 100%; height: 250px; background-size: cover; background-position: center; position: relative; }
        .profile-cover-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent, rgba(255,255,255,1)); }
        .profile-avatar-large { width: 160px; height: 200px; object-fit: cover; border: 6px solid white; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-top: -100px; margin-left: 40px; position: relative; z-index: 2; transform: rotate(-3deg); }
        .handwritten { font-family: var(--font-hand); }
        @media (max-width: 768px) { .profile-modal-content > div { flex-direction: column; } .profile-avatar-large { margin: -80px auto 20px auto; transform: rotate(0); } .modal-right { padding: 20px !important; } .grid-indie { grid-template-columns: 1fr 1fr; } }
        #sakura-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .film-grain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; opacity: 0.05; background: url('https://www.transparenttextures.com/patterns/stardust.png'); }
    </style>
</head>
<body class="bg-class bg-fixed-layer">
    <div id="sakura-container"></div>
    <div class="film-grain"></div>

    <!-- VINYL MUSIC PLAYER -->
    <div class="vinyl-player">
        <div id="vinyl-disc" class="vinyl-disc">
            <div class="vinyl-center"></div>
        </div>
        <div style="line-height: 1.2;">
            <div style="font-size: 0.75rem; font-weight: 700; font-family: var(--font-title);">Giai Điệu Năm Ấy</div>
            <div id="music-status" style="font-size: 0.6rem; opacity: 0.6;">Nhấn để phát nhạc...</div>
        </div>
        <button id="toggle-music" style="background:none; border:none; cursor:pointer;">
            <i data-lucide="play" id="music-icon-ui" style="width:20px;"></i>
        </button>
        <audio id="bg-audio" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="indie-container">
        <a href="sign.html" class="btn-scrapbook" style="position: fixed; top: 30px; left: 30px; z-index: 1000;">
            <i data-lucide="edit-3"></i>
            <span>GÓC CỦA TỚ</span>
        </a>

        <header class="section-wrapper">
            <h1 class="title-main">Chúng Ta Của Năm Ấy</h1>
            <p class="handwritten" style="font-size: 2rem;">"Những bông hoa rực rỡ nhất niên khóa 2026"</p>
            <div class="handwritten" style="margin-top: 40px; opacity: 0.6; font-size: 1.5rem;">Cuộn để lật lại từng trang ký niệm... ↓</div>
        </header>

        <div id="members-grid" class="grid-indie"></div>

        <section class="wish-section">
            <h2 class="title-main" style="font-size: 3.5rem; margin-bottom: 20px;">Bảng Ghim Nguyện Ước</h2>
            <p class="handwritten" style="font-size: 1.4rem; margin-bottom: 30px;">Cậu có thể kéo thả để sắp xếp nhé!</p>
            <div id="wishes-container" class="corkboard"></div>
            <div class="wish-input-group" style="margin-top:40px;">
                <input type="text" id="wish-input" placeholder="Viết gì đó thật xinh...">
                <button id="send-wish"><i data-lucide="send"></i></button>
            </div>
        </section>

        <section class="section-wrapper">
            <h2 class="title-main" style="font-size: 4rem;">Mãi Là Bạn Thân</h2>
            <div class="polaroid-card" style="max-width: 1000px; padding: 20px; transform: rotate(-1deg); margin: 40px auto;">
                <div class="washi-tape"></div>
                <img src="https://images.unsplash.com/photo-1523050853063-bd8012fbb230?q=80&w=2070" style="width: 100%; border-radius: 2px; display: block; filter: contrast(1.1);">
                <p class="handwritten" style="text-align: center; font-size: 2.5rem; margin-top: 30px; color: var(--ink-blue);">Hẹn gặp lại ở một đỉnh cao mới!</p>
            </div>
        </section>
    </div>

    <div id="detail-modal" class="modern-overlay">
        <div id="detail-content-target" class="profile-modal-content"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/firebase-init.js"></script>
    <script src="assets/js/app-class.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
