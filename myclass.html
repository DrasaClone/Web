<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp Chúng Mình - Thanh Xuân 2026</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-class bg-fixed-layer">
    <div id="sakura-container"></div>

    <div class="indie-container">
        <!-- NÚT ĐIỀU HƯỚNG CỐ ĐỊNH -->
        <a href="sign.html" class="btn-indie fixed-nav-btn">
            <i data-lucide="edit-3"></i>
            <span>GÓC CỦA TỚ</span>
        </a>

        <!-- ĐẦU TRANG -->
        <header class="section-wrapper">
            <h1 class="title-indie">Chúng Ta Của Năm Ấy</h1>
            <p class="subtitle-indie">"Những bông hoa rực rỡ nhất niên khóa 2026"</p>
            <div class="handwritten" style="margin-top: 40px; opacity: 0.6; font-size: 1.5rem;">Cùng tớ lật giở từng trang kỷ niệm nhé ↓</div>
        </header>

        <!-- GRID DANH SÁCH LỚP -->
        <div id="members-grid" class="grid-indie">
            <!-- Nạp bởi app-class.js -->
        </div>

        <!-- BỨC TƯỜNG NGUYỆN ƯỚC -->
        <section class="wish-section">
            <h2 class="title-indie" style="font-size: 3.5rem;">Vì Sao Nguyện Ước</h2>
            <p class="handwritten" style="font-size: 1.4rem; color: var(--text-human); font-weight: 700;">Gửi một lời nhắn cho tương lai nhé...</p>
            
            <div id="wishes-container" class="wishes-flow"></div>
            
            <div class="wish-input-group">
                <input type="text" id="wish-input" placeholder="Viết gì đó thật xinh...">
                <button id="send-wish"><i data-lucide="send"></i></button>
            </div>
        </section>

        <!-- ẢNH TẬP THỂ -->
        <section class="section-wrapper">
            <h2 class="title-indie" style="font-size: 4rem;">Mãi Là Bạn Thân</h2>
            <div style="width: 100%; max-width: 1000px; background: white; padding: 15px; border: 2px solid var(--text-human); transform: rotate(-1deg); box-shadow: 15px 15px 0px var(--sky-blue); margin-top: 40px;">
                <img src="https://images.unsplash.com/photo-1523050853063-bd8012fbb230?q=80&w=2070" style="width: 100%; border-radius: 2px; display: block; filter: contrast(1.1);">
                <p class="handwritten" style="text-align: center; font-size: 2rem; margin-top: 25px; color: var(--ink-blue); font-weight: 700;">Hẹn gặp lại ở một đỉnh cao mới!</p>
            </div>
            <div class="handwritten" style="margin-top: 100px; opacity: 0.3;">--- HẾT TRANG LƯU BÚT ---</div>
        </section>
    </div>

    <!-- MODAL CHI TIẾT -->
    <div id="detail-modal" class="modern-overlay">
        <div class="modal-indie">
            <button class="close-modal" style="position: absolute; top: 20px; right: 20px; background: none; border: none; cursor: pointer;">
                <i data-lucide="x" style="width: 30px; height: 30px; color: var(--text-human);"></i>
            </button>
            <div id="detail-content-target"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script type="module" src="assets/js/firebase-init.js"></script>
    <script src="assets/js/app-class.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
