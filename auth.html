<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi Danh | Ký Ức Trong Veo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
    <script>tailwind = { config: { corePlugins: { preflight: false } } }</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <canvas id="starry-night"></canvas>
    <canvas id="fireflies-canvas"></canvas>
    <div id="sakura-container"></div>
    <div id="page-overlay" class="fixed inset-0 bg-[#FFFBF0] z-[10000] pointer-events-none opacity-0"></div>
    <div id="toast-container" class="toast"></div>
    
    <div id="loading-screen" class="fixed inset-0 bg-[#FFFBF0] z-[9999] flex flex-col items-center justify-center">
        <h1 class="font-heading italic text-5xl text-[#5D4037]">Đang mở cửa ký ức...</h1>
        <div class="mt-6 w-48 h-[2px] bg-[#5D4037]/10 overflow-hidden rounded-full">
            <div id="loading-bar" class="w-full h-full bg-[#FF8AB8] origin-left scale-x-0"></div>
        </div>
    </div>

    <div id="app" class="opacity-0"></div>

    <template id="auth-template">
        <div class="min-h-screen flex items-center justify-center p-8">
            <div class="liquid-glass p-10 md:p-16 rounded-[2rem] max-w-lg w-full text-center border-[#5D4037]/10 shadow-2xl">
                <div class="flex justify-end mb-4">
                    <button id="dark-mode-toggle" class="w-10 h-10 rounded-full flex items-center justify-center hover:scale-110 transition-all text-lg" title="Chuyển giao diện">🌙</button>
                </div>
                <h1 class="font-heading italic text-5xl md:text-6xl mb-4 text-muted">Về Nhà Thôi</h1>
                <p class="font-body text-muted opacity-70 mb-8 leading-relaxed text-sm">
                    Cánh cửa thanh xuân đang chờ đợi. Đăng nhập để cùng nhau mở lại những thước phim cũ.
                </p>
                
                <!-- ═══ GOOGLE ═══ -->
                <button id="google-login-btn" class="liquid-glass w-full py-4 md:py-5 rounded-full flex items-center justify-center gap-4 hover:bg-white/10 transition-all hover:scale-[1.02] active:scale-95 border-muted/20">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="24" onerror="this.style.display='none'; this.parentNode.style.gap='8px'" alt="Google">
                    <span class="font-heading italic text-base md:text-lg text-muted">Kết nối với Google</span>
                </button>

                <p class="text-xs text-muted/30 mt-2">📱 Dùng điện thoại? <button id="google-redirect-btn" class="text-[#FF8AB8] hover:underline font-bold">Đăng nhập qua chuyển hướng</button></p>

                <!-- ═══ DIVIDER ═══ -->
                <div class="flex items-center gap-4 my-6">
                    <div class="flex-1 h-px bg-muted/10"></div>
                    <span class="text-xs text-muted/30 font-body">hoặc</span>
                    <div class="flex-1 h-px bg-muted/10"></div>
                </div>

                <!-- ═══ EMAIL TABS: Magic Link | OTP Code ═══ -->
                <div class="flex gap-2 mb-6 bg-[#3E2723]/5 rounded-full p-1" id="email-method-tabs">
                    <button data-method="magic-link" class="email-tab active flex-1 px-4 py-2 rounded-full text-xs font-bold text-muted bg-white/60 transition-all">🔗 Magic Link</button>
                    <button data-method="otp" class="email-tab flex-1 px-4 py-2 rounded-full text-xs font-bold text-muted/40 hover:text-muted transition-all">🔢 Mã Code</button>
                </div>

                <!-- ═══ Shared Email Input ═══ -->
                <div class="flex flex-col gap-3 mb-4">
                    <div class="flex gap-2">
                        <input type="email" id="email-input" placeholder="Nhập email của bạn..." 
                            class="flex-1 bg-white/40 rounded-full px-5 py-3 outline-none font-body text-sm text-muted">
                        <button id="send-email-btn" class="px-5 py-3 rounded-full bg-[#81D4FA]/20 text-[#81D4FA] text-sm font-bold hover:bg-[#81D4FA]/30 transition-all whitespace-nowrap">
                            Gửi ✉️
                        </button>
                    </div>
                </div>

                <!-- ═══ Magic Link Confirmation ═══ -->
                <div id="magic-link-box" class="hidden">
                    <div id="email-confirm-box" class="p-4 bg-[#81D4FA]/5 rounded-2xl border border-[#81D4FA]/10">
                        <p class="font-body text-sm text-muted/70 mb-2">✉️ Link đã gửi! Kiểm tra email <span id="sent-email" class="font-bold"></span> và click vào link trong email để đăng nhập.</p>
                        <p class="font-body text-xs text-muted/40">Nếu không thấy, hãy kiểm tra hộp thư Spam.</p>
                    </div>
                </div>

                <!-- ═══ OTP Code Section ═══ -->
                <div id="otp-box" class="hidden">
                    <p class="text-[10px] text-muted/30 mb-3" id="otp-status-text">Nhập mã 6 số được gửi đến email của bạn</p>
                    <div class="flex gap-2 justify-center mb-4">
                        <input type="text" id="otp-input" maxlength="6" placeholder="000000"
                            class="w-40 text-center bg-white/40 rounded-full px-5 py-3 outline-none font-body text-lg tracking-[8px] text-muted">
                        <button id="verify-otp-btn" class="px-5 py-3 rounded-full bg-[#FF8AB8]/20 text-[#FF8AB8] text-sm font-bold hover:bg-[#FF8AB8]/30 transition-all">
                            Xác nhận ✅
                        </button>
                    </div>
                    <button id="resend-otp-btn" class="text-[10px] text-muted/30 hover:text-[#81D4FA] transition-all">
                        🔄 Gửi lại mã
                    </button>
                    <div id="otp-timer" class="text-[10px] text-muted/20 mt-1"></div>
                </div>

                <!-- ═══ DIVIDER ═══ -->
                <div class="flex items-center gap-4 my-6">
                    <div class="flex-1 h-px bg-muted/10"></div>
                    <span class="text-xs text-muted/30 font-body">hoặc</span>
                    <div class="flex-1 h-px bg-muted/10"></div>
                </div>

                <!-- ═══ CROSS-DEVICE REQUEST ═══ -->
                <button id="cross-device-btn" class="liquid-glass w-full py-3 md:py-4 rounded-full flex items-center justify-center gap-3 hover:bg-white/10 transition-all hover:scale-[1.02] active:scale-95 border-muted/20 text-sm font-heading text-muted">
                    <span>📱</span>
                    <span>Gửi yêu cầu đến thiết bị khác</span>
                </button>

                <!-- ═══ CROSS-DEVICE WAITING SCREEN ═══ -->
                <div id="cross-device-waiting" class="hidden p-6 bg-[#81D4FA]/5 rounded-2xl border border-[#81D4FA]/10 mt-4">
                    <div class="flex items-center justify-center gap-3 mb-4">
                        <span class="inline-block w-3 h-3 rounded-full bg-[#81D4FA] animate-pulse"></span>
                        <span class="inline-block w-3 h-3 rounded-full bg-[#FF8AB8] animate-pulse" style="animation-delay: 0.3s"></span>
                        <span class="inline-block w-3 h-3 rounded-full bg-[#A5D6A7] animate-pulse" style="animation-delay: 0.6s"></span>
                    </div>
                    <p class="font-body text-sm text-muted/70 mb-1 font-bold">🔔 Đã gửi yêu cầu!</p>
                    <p class="font-body text-xs text-muted/50 mb-3">
                        Kiểm tra thiết bị <span class="font-bold text-[#FF8AB8]">khác</span> (điện thoại/máy tính bảng) 
                        đã đăng nhập email <span id="cross-device-email" class="font-bold"></span> 
                        để xác nhận. Yêu cầu sẽ hết hạn sau <span id="cross-device-timer">60</span> giây.
                    </p>
                    <button id="cancel-cross-device" class="text-xs text-muted/30 hover:text-muted transition-all font-body">
                        🔄 Huỷ và thử cách khác
                    </button>
                    <div id="cross-device-status" class="hidden mt-3"></div>
                </div>

                <a href="main.html" class="mt-6 block text-sm text-muted opacity-50 hover:opacity-100 transition-all font-body">
                    Quay lại sảnh chính
                </a>
            </div>
        </div>
    </template>

    <!-- EmailJS for sending OTP codes -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="module" src="assets/js/utils.js"></script>
    <script type="module" src="assets/js/loading.js"></script>
    <script type="module" src="assets/js/starry-night.js"></script>
    <script type="module" src="assets/js/fireflies.js"></script>
    <!-- EmailJS SDK for OTP email delivery -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
