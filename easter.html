<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bí Mật & Tính Năng | Ký Ức Trong Veo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦊</text></svg>">
    <script>tailwind = { config: { corePlugins: { preflight: false } } }</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        .egg-card { transition: all 0.3s ease; cursor: default; }
        .egg-card:hover { transform: translateY(-4px); box-shadow: 0 12px 35px -10px rgba(62, 39, 35, 0.15); }
        html.dark .egg-card:hover { box-shadow: 0 12px 35px -10px rgba(0, 0, 0, 0.4); }
        .egg-found { background: rgba(165, 214, 167, 0.1) !important; border-color: rgba(165, 214, 167, 0.2) !important; }
        .egg-hidden { opacity: 0.5; filter: grayscale(0.3); }
        .section-divider { width: 60px; height: 3px; border-radius: 2px; margin: 0 auto; }
        .feature-icon { font-size: 1.8rem; line-height: 1; }
        .tag { display: inline-block; padding: 2px 10px; border-radius: 50px; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
        .tag-new { background: rgba(255, 138, 184, 0.15); color: #FF8AB8; }
        .tag-easter { background: rgba(255, 213, 79, 0.15); color: #D4A017; }
        .tag-core { background: rgba(129, 212, 250, 0.15); color: #4FC3F7; }
        .tag-secret { background: rgba(206, 147, 216, 0.15); color: #CE93D8; }
        .stats-number { font-family: 'Fraunces', serif; font-weight: 700; font-size: 2rem; line-height: 1; }
        @keyframes gentlePulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        .discovered-badge { animation: gentlePulse 2s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="sakura-container"></div>
    <div id="app"></div>

    <template id="hero-template">
        <div class="min-h-screen p-4 md:p-12">
            <div class="max-w-5xl mx-auto">
                <!-- ═══ HEADER ═══ -->
                <div class="liquid-glass p-8 md:p-12 text-center mb-8">
                    <div class="flex justify-between items-center mb-6">
                        <a href="main.html" class="liquid-glass inline-flex items-center gap-2 px-4 py-2 rounded-full hover:bg-white/50 transition-all text-brown text-sm font-heading">
                            ← Về sảnh chính
                        </a>
                        <span class="text-4xl">🦊</span>
                    </div>
                    
                    <h1 class="font-heading text-5xl md:text-7xl text-muted mb-4">
                        🥚 Bí Mật &<br>
                        <span class="text-[#FF8AB8]">Tính Năng</span>
                    </h1>
                    <p class="font-handwriting text-lg md:text-xl text-muted/60 mb-2">
                        "Những điều thú vị ẩn giấu trong Ký Ức Trong Veo"
                    </p>
                    <div class="w-16 h-0.5 bg-gradient-to-r from-[#FF8AB8] to-[#A5D6A7] mx-auto my-6 rounded-full"></div>
                    <p class="font-body text-sm text-muted/50 max-w-lg mx-auto">
                        Trang này tổng hợp tất cả tính năng, Easter eggs, và bí mật bạn có thể khám phá. 
                        Một số đã được tìm thấy... một số vẫn đang chờ đợi! 🕵️
                    </p>
                </div>

                <!-- ═══ STATS ═══ -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="liquid-glass p-4 text-center">
                        <div class="stats-number text-[#FF8AB8]">14</div>
                        <div class="font-body text-xs text-muted/50 mt-1">Tính năng chính</div>
                    </div>
                    <div class="liquid-glass p-4 text-center">
                        <div class="stats-number text-[#FFD54F]">16</div>
                        <div class="font-body text-xs text-muted/50 mt-1">Easter Eggs 🥚</div>
                    </div>
                    <div class="liquid-glass p-4 text-center">
                        <div class="stats-number text-[#A5D6A7]">4</div>
                        <div class="font-body text-xs text-muted/50 mt-1">Cách đăng nhập</div>
                    </div>
                    <div class="liquid-glass p-4 text-center">
                        <div class="stats-number text-[#81D4FA]">∞</div>
                        <div class="font-body text-xs text-muted/50 mt-1">Kỷ niệm</div>
                    </div>
                </div>

                <!-- ═══ FEATURES SECTION ═══ -->
                <div class="liquid-glass p-8 md:p-10 mb-8">
                    <h2 class="font-heading text-3xl md:text-4xl text-muted mb-2">📋 Tính Năng Chính</h2>
                    <div class="section-divider bg-gradient-to-r from-[#81D4FA] to-[#FF8AB8] mb-8"></div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Feature 1 -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start">
                            <span class="feature-icon">📸</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Album Kỷ Niệm</h3>
                                    <span class="tag tag-core">Core</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">Upload ảnh kỷ niệm, xem gallery full-screen với navigation, tự động nén ảnh.</p>
                            </div>
                        </div>
                        
                        <!-- Feature 2 -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start">
                            <span class="feature-icon">✍️</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Bức Tường Kỷ Niệm</h3>
                                    <span class="tag tag-core">Core</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">Ghi chú, ghim ảnh, gửi giọng nói realtime. Xoá kỷ niệm của chính mình.</p>
                            </div>
                        </div>
                        
                        <!-- Feature 3 -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start">
                            <span class="feature-icon">🎵</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Âm Nhạc Cá Nhân</h3>
                                    <span class="tag tag-core">Core</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">Mỗi người có bài nhạc riêng. Hỗ trợ YouTube, Spotify, SoundCloud, MP3.</p>
                            </div>
                        </div>
                        
                        <!-- Feature 4 -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start">
                            <span class="feature-icon">🏆</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Wildcard Gallery</h3>
                                    <span class="tag tag-core">Core</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">Mỗi người một số áo + màu sắc. Click để xem hiệu ứng wobble + particle burst!</p>
                            </div>
                        </div>
                        
                        <!-- Feature 5 -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start">
                            <span class="feature-icon">🧠</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Quiz: Hiểu Sự An Ý</h3>
                                    <span class="tag tag-core">Core</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">Tạo câu hỏi về bản thân, người khác trả lời. Leaderboard realtime!</p>
                            </div>
                        </div>
                        
                        <!-- Feature 6 -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start">
                            <span class="feature-icon">📰</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Bảng Tin Lớp</h3>
                                    <span class="tag tag-core">Core</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">Đăng ảnh + caption, reaction emoji, bình luận, chia sẻ link. Sort theo thời gian / hot.</p>
                            </div>
                        </div>
                        
                        <!-- Feature 7 -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start">
                            <span class="feature-icon">🎙️</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Agora Meeting Room</h3>
                                    <span class="tag tag-core">Core</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">Gặp gỡ online qua audio/video realtime. Tích hợp Agora SDK.</p>
                            </div>
                        </div>
                        
                        <!-- Feature 8 -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start">
                            <span class="feature-icon">🌸</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Sticker Scrapbook</h3>
                                    <span class="tag tag-core">Core</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">Kéo-thả sticker lên board. Drag-and-drop với GSAP Draggable, undo khi thả vào thùng rác.</p>
                            </div>
                        </div>
                        
                        <!-- Feature 9 -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start">
                            <span class="feature-icon">🔐</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Đăng Nhập Đa Phương Thức</h3>
                                    <span class="tag tag-new">NEW</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">Google Popup, Google Redirect (mobile), Email Magic Link, OTP Code, Cross-Device Approval.</p>
                            </div>
                        </div>
                        
                        <!-- Feature 10 -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start">
                            <span class="feature-icon">📱</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Cross-Device Login</h3>
                                    <span class="tag tag-new">NEW</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">Nhập email trên máy tính → phone xác nhận → tự động đăng nhập. Realtime qua Firebase!</p>
                            </div>
                        </div>
                        
                        <!-- Feature 11 -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start">
                            <span class="feature-icon">🛡️</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">SafeDB Bảo Mật</h3>
                                    <span class="tag tag-new">NEW</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">Mọi thao tác ghi đều qua lớp kiểm tra + ghi log vào node _safe/logs. Chống XSS, validate dữ liệu.</p>
                            </div>
                        </div>
                        
                        <!-- Feature 12 -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start">
                            <span class="feature-icon">🌙</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Dark Mode</h3>
                                    <span class="tag tag-core">Core</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">Chuyển đổi giao diện tối/sáng. Lưu trạng thái trong localStorage.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ═══ EASTER EGGS SECTION ═══ -->
                <div class="liquid-glass p-8 md:p-10 mb-8">
                    <h2 class="font-heading text-3xl md:text-4xl text-muted mb-2">🥚 Easter Eggs & Bí Mật</h2>
                    <div class="section-divider bg-gradient-to-r from-[#FFD54F] to-[#FF8AB8] mb-8"></div>
                    
                    <p class="font-body text-sm text-muted/50 mb-8 text-center italic">
                        ⚠️ Spoilers ahead! Mỗi mục đều có thể khám phá trong trang.
                    </p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Egg 1: Konami Code -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start egg-found">
                            <span class="text-3xl">🎮</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Konami Code</h3>
                                    <span class="tag tag-easter">Đã tìm thấy</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">
                                    Gõ <code class="bg-[#3E2723]/10 px-1 rounded text-[10px]">↑↑↓↓←→←→BA</code> trên bàn phím 
                                    → mưa hoa anh đào + rung màn hình! 🌸🎉
                                </p>
                            </div>
                        </div>

                        <!-- Egg 2: Title Click -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start egg-found">
                            <span class="text-3xl">👆</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Click Tiêu Đề 5 Lần</h3>
                                    <span class="tag tag-easter">Đã tìm thấy</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">
                                    Click vào "Ký Ức Trong Veo" 5 lần liên tiếp → bắn pháo hoa confetti + toast thông báo! 🎊
                                </p>
                            </div>
                        </div>

                        <!-- Egg 3: Divider Hover -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start egg-found">
                            <span class="text-3xl">✨</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Divider Hover 7 Lần</h3>
                                    <span class="tag tag-easter">Đã tìm thấy</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">
                                    Hover vào thanh gradient dưới tiêu đề 7 lần → sticky note đổi lời nhắn bí mật! 🌈
                                </p>
                            </div>
                        </div>

                        <!-- Egg 4: Sticky Note -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start egg-found">
                            <span class="text-3xl">💬</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Sticky Note Quotes</h3>
                                    <span class="tag tag-easter">Đã tìm thấy</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">
                                    Click vào sticky note để xem các câu nói ngẫu nhiên. Có 8 quotes khác nhau! 📖
                                </p>
                            </div>
                        </div>

                        <!-- Egg 5: Cursor Trail -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start egg-found">
                            <span class="text-3xl">🌟</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Cursor Sparkle Trail</h3>
                                    <span class="tag tag-easter">Đã tìm thấy</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">
                                    Di chuyển chuột — những hạt lấp lánh màu pastel bay theo! Mỗi hạt là một màu khác nhau. 🎨
                                </p>
                            </div>
                        </div>

                        <!-- Egg 6: Time Greeting -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start egg-found">
                            <span class="text-3xl">⏰</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Lời Chào Theo Giờ</h3>
                                    <span class="tag tag-easter">Đã tìm thấy</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">
                                    Tuỳ theo thời gian trong ngày, sẽ có một lời chào khác nhau. Thử mở lúc sáng sớm, trưa, chiều, tối! 🌙
                                </p>
                            </div>
                        </div>

                        <!-- Egg 7: Heli Mode -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start egg-found">
                            <span class="text-3xl">🚁</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">'Heli' Secret Command</h3>
                                    <span class="tag tag-easter">Đã tìm thấy</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">
                                    Gõ "heli" trên bàn phím → mọi thứ quay màu cầu vồng + border gradient! Tự động tắt sau 5 giây. 🌈
                                </p>
                            </div>
                        </div>

                        <!-- Egg 8: Mascot Helper -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start egg-found">
                            <span class="text-3xl">🦊</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Mascot Helper</h3>
                                    <span class="tag tag-easter">Đã tìm thấy</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">

                                </p>

                            <span class="text-3xl">💿</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">

                                    <span class="tag tag-secret">Còn ẩn</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">
                                    Double-click vào ảnh đại diện trong profile modal → đĩa than quay nhanh + hiệu ứng âm thanh! 🎵
                                </p>
                            </div>
                        </div>

                        <!-- Egg 10: Wildcard Party -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start">
                            <span class="text-3xl">🎉</span>

                                </p>
                            </div>
                        </div>

                        <!-- Egg 11: Type "hi" -->

                            <span class="text-3xl">👋</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">

                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">
                                    Gõ "hi" (bất kỳ đâu) → một làn sóng emoji lan toả từ vị trí click gần nhất! 🌊
                                </p>
                            </div>
                        </div>

                        <!-- Egg 12: Polaroid Rain -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start">
                            <span class="text-3xl">🌧️</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Polaroid Rain</h3>
                                    <span class="tag tag-secret">Còn ẩn</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">
                                    Trong mưa sao băng (tháng 8-12), hoa anh đào chuyển thành polaroid rơi. 🌠
                                </p>
                            </div>
                        </div>

                        <!-- Egg 13: Corner Fox Secret Menu -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start egg-found">
                            <span class="text-3xl">🦊</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Corner Fox Secret Menu</h3>
                                    <span class="tag tag-easter">Đã tìm thấy</span>
                                </div>
                                <p class="font-body text-xs text-muted/60 leading-relaxed">
                                    Click 🦊 ở góc dưới-phải 5 lần liên tiếp → mở Secret Menu với stats + danh sách egg! 🗺️
                                </p>
                            </div>
                        </div>

                        <!-- Egg 14: Fireworks Command -->
                        <div class="egg-card liquid-glass p-5 bg-white/30 flex gap-4 items-start">
                            <span class="text-3xl">🎆</span>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="font-heading text-lg text-muted">Fireworks!</h3>
                                    <span class="tag tag-secret">Còn ẩn</span>
