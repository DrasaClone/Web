<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ký Ức Trong Veo | Scrapbook Thanh Xuân</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
    <script>
        tailwind = { config: { corePlugins: { preflight: false } } }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div id="sakura-container"></div>
    <div id="page-overlay" class="fixed inset-0 bg-[#FFFBF0] z-[10000] pointer-events-none opacity-0"></div>
    <div id="toast-container" class="toast"></div>
    
    <div id="loading-screen" class="fixed inset-0 bg-[#FFFBF0] z-[9999] flex flex-col items-center justify-center">
        <h1 class="font-heading italic text-5xl text-[#5D4037]">Đang mở lại ký ức...</h1>
        <div class="mt-6 w-48 h-[2px] bg-[#5D4037]/10 overflow-hidden rounded-full">
            <div id="loading-bar" class="w-full h-full bg-[#FF8AB8] origin-left scale-x-0"></div>
        </div>
    </div>

    <div id="app" class="flex items-center justify-center min-h-screen"></div>

    <template id="hero-template">
        <!-- Ambient floating orbs -->
        <div id="hero-orbs" class="absolute inset-0 overflow-hidden pointer-events-none z-0">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>

        <div class="relative z-10 liquid-glass p-12 md:p-16 text-center max-w-2xl border-[#5D4037]/10 shadow-xl hero-card">
            <div class="flex justify-end mb-4">
                <button id="dark-mode-toggle" class="w-10 h-10 rounded-full flex items-center justify-center hover:scale-110 transition-all text-lg" title="Chuyển giao diện">🌙</button>
            </div>
            
            <!-- Subtitle reveal -->
            <p class="font-handwriting text-lg md:text-xl text-muted opacity-60 mb-4" id="hero-subtitle">✦ Lưu bút thanh xuân ✦</p>
            
            <h1 class="font-heading text-7xl md:text-8xl mb-6 text-muted leading-tight" id="hero-title">
                Ký Ức<br>
                <span class="text-[#FF8AB8]">Trong Veo</span>
            </h1>
            
            <div id="hero-divider" class="w-16 h-0.5 bg-[#FF8AB8]/40 mx-auto mb-6 rounded-full"></div>
            
            <p class="font-body text-lg md:text-xl text-muted opacity-80 leading-relaxed mb-12" id="hero-description">
                Những thước phim thanh xuân rực rỡ nhất
                <br class="hidden sm:block">
                đang chờ cậu mở lại.
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center" id="hero-buttons">
                <a href="auth.html" class="hero-btn liquid-glass px-8 md:px-10 py-4 font-heading text-lg md:text-xl hover:bg-white/50 transition-all cursor-pointer text-muted flex items-center gap-2 group">
                    <span>Ghi danh lưu bút</span>
                    <span class="inline-block transition-transform group-hover:translate-x-1">✎</span>
                </a>
                <a href="myclass.html" class="hero-btn liquid-glass px-8 md:px-10 py-4 font-heading text-lg md:text-xl hover:bg-white/50 transition-all cursor-pointer text-muted flex items-center gap-2 group">
                    <span>Thăm lớp mình</span>
                    <span class="inline-block transition-transform group-hover:translate-x-1">→</span>
                </a>
            </div>
            
            <button id="audio-toggle" class="mt-8 text-sm font-bold text-muted opacity-40 hover:opacity-100 flex items-center gap-2 mx-auto transition-all">
                <span id="audio-icon">🔇</span>
                <span id="audio-text">Bật âm thanh</span>
            </button>
        </div>

        <!-- Scroll indicator -->
        <div id="scroll-indicator" class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 opacity-0 z-10">
            <span class="text-xs font-body text-muted/40 tracking-widest">CUỘN XUỐNG</span>
            <div class="scroll-arrow">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-muted/60">
                    <path d="M12 5v14m0 0l-6-6m6 6l6-6"/>
                </svg>
            </div>
        </div>
    </template>

    <script type="module" src="assets/js/utils.js"></script>
    <script type="module" src="assets/js/loading.js"></script>
    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
