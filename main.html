<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ký Ức Trong Veo | Scrapbook Thanh Xuân</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div id="sakura-container"></div>
    <div id="page-overlay" class="fixed inset-0 bg-[#FFFBF0] z-[10000] pointer-events-none opacity-0"></div>
    <div id="toast-container" class="toast"></div>
    
    <div id="loading-screen" class="fixed inset-0 bg-[#FFFBF0] z-[9999] flex flex-col items-center justify-center">
        <h1 class="font-heading italic text-5xl text-[#5D4037]">Đang mở lại ký ức...</h1>
        <div class="mt-6 w-48 h-[2px] bg-[#5D4037]/10 overflow-hidden rounded-full">
            <div id="loading-bar" class="w-full h-full bg-[#FF8AB8] origin-left scale-x-0"></div>
        </div>
    </div>

    <div id="app" class="flex items-center justify-center min-h-screen opacity-0"></div>

    <template id="hero-template">
        <div class="liquid-glass p-16 text-center max-w-2xl border-[#5D4037]/10 shadow-xl">
            <div class="flex justify-end mb-4">
                <button id="dark-mode-toggle" class="w-10 h-10 rounded-full flex items-center justify-center hover:scale-110 transition-all text-lg" title="Chuyển giao diện">🌙</button>
            </div>
            <h1 class="font-heading text-8xl mb-8 text-muted">Ký Ức Trong Veo</h1>
            <p class="font-body text-2xl text-muted opacity-80 leading-relaxed mb-16">
                Những thước phim thanh xuân rực rỡ nhất đang cậu mở lại.
            </p>
            <div class="flex gap-6 justify-center">
                <a href="auth.html" class="liquid-glass px-10 py-4 font-heading text-xl hover:bg-white/50 transition-all cursor-pointer text-muted">Ghi danh lưu bút</a>
                <a href="myclass.html" class="liquid-glass px-10 py-4 font-heading text-xl hover:bg-white/50 transition-all cursor-pointer text-muted">Thăm lớp mình</a>
            </div>
            <button id="audio-toggle" class="mt-8 text-sm font-bold text-muted opacity-40 hover:opacity-100 flex items-center gap-2 mx-auto transition-all">
                <span id="audio-icon">🔇</span>
                <span id="audio-text">Bật âm thanh</span>
            </button>
        </div>
    </template>

    <script type="module" src="assets/js/utils.js"></script>
    <script type="module" src="assets/js/loading.js"></script>
    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
