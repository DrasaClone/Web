<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lưu Bút Thanh Xuân 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Pattaya&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="sakura-container"></div>
    <div class="film-grain"></div>

    <main class="hero-soft" style="min-height: 100vh; text-align: center;">
        <div class="hero-content">
            <div class="handwritten" style="font-size: 1.5rem; opacity: 0.6; margin-bottom: 20px;">Thương gửi niên khóa 2022 - 2026</div>
            <h1 class="title-modern">Ký Ức <br><span style="color: var(--sakura-deep);">Trong Veo</span></h1>
            <p class="subtitle-modern" style="max-width: 600px; margin: 20px auto 40px;">Nơi những đóa hoa rực rỡ nhất của tuổi trẻ vẫn luôn tỏa sáng trong lòng chúng mình.</p>
            
            <a href="sign.html" class="google-btn soft-card" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">
                <i data-lucide="sparkles" style="color: var(--sakura-primary);"></i>
                <span style="margin-left: 15px; font-weight: 700; color: var(--text-main);">MỞ CUỐN LƯU BÚT</span>
            </a>

            <div class="handwritten" style="margin-top: 60px; opacity: 0.4; font-size: 1.2rem;">
                Dù mai đây có đi đâu, chúng mình vẫn mãi là một gia đình...
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        lucide.createIcons();
        const container = document.getElementById('sakura-container');
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.innerHTML = '🌸';
            p.className = 'floating-petal';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = '-50px';
            p.style.position = 'fixed';
            container.appendChild(p);
            gsap.to(p, { y: '110vh', x: '+=100', rotation: 360, duration: 5 + Math.random() * 5, repeat: -1, delay: Math.random() * 5, ease: 'none' });
        }
    </script>
</body>
</html>
