<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ký Ức Trong Veo | Scrapbook Thanh Xuân</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
    <script>tailwind = { config: { corePlugins: { preflight: false } } }</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div id="sakura-container"></div>
    <canvas id="starry-night"></canvas>
    <div id="page-overlay" class="fixed inset-0 bg-[#FFFBF0] z-[10000] pointer-events-none opacity-0"></div>
    <div id="toast-container" class="toast"></div>
    
    <div id="loading-screen" class="fixed inset-0 bg-[#FFFBF0] z-[9999] flex flex-col items-center justify-center">
        <h1 class="font-heading italic text-5xl text-[#5D4037]">Đang mở lại ký ức...</h1>
        <div class="mt-6 w-48 h-[2px] bg-[#5D4037]/10 overflow-hidden rounded-full">
            <div id="loading-bar" class="w-full h-full bg-[#FF8AB8] origin-left scale-x-0"></div>
        </div>
    </div>

    <div id="app" class="flex items-center justify-center min-h-screen"></div>

    <template id="hero-template">
        <!-- Ambient floating orbs -->
        <div id="hero-orbs" class="absolute inset-0 overflow-hidden pointer-events-none z-0">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>

        <!-- ===== Decorative Stamp Elements ===== -->
        <div class="deco-stamp deco-stamp-1 hidden md:block" aria-hidden="true">🌸 KỶ NIỆM</div>
        <div class="deco-stamp deco-stamp-2 hidden md:block" aria-hidden="true">📸 THANH XUÂN</div>
        <div class="deco-plane hidden md:block" aria-hidden="true">✈️</div>

        <!-- ===== Floating Polaroid Decor ===== -->
        <div class="deco-polaroid deco-polaroid-1 hidden lg:block" aria-hidden="true">
            <div class="deco-polaroid-img" style="background-image: url('https://picsum.photos/seed/memory1/200/200')"></div>
            <div class="deco-polaroid-caption">20.11.2024</div>
        </div>
        <div class="deco-polaroid deco-polaroid-2 hidden lg:block" aria-hidden="true">
            <div class="deco-polaroid-img" style="background-image: url('https://picsum.photos/seed/memory2/200/200')"></div>
            <div class="deco-polaroid-caption">Lớp 9/13</div>
        </div>
        
        <!-- ===== Anime Decorative Elements ===== -->
        <div class="anime-star star-1 hidden md:block" aria-hidden="true">⭐</div>
        <div class="anime-star star-2 hidden md:block" aria-hidden="true">✨</div>
        <div class="anime-star star-3 hidden md:block" aria-hidden="true">💫</div>
        <div class="anime-heart hidden md:block" aria-hidden="true">💖</div>

        <div class="relative z-10 liquid-glass p-12 md:p-16 text-center max-w-2xl border-[#5D4037]/10 shadow-xl hero-card vibrant-border">
            <div class="flex justify-end mb-4">
                <button id="dark-mode-toggle" class="w-10 h-10 rounded-full flex items-center justify-center hover:scale-110 transition-all text-lg" title="Chuyển giao diện">🌙</button>
            </div>
            
            <!-- Subtitle reveal -->
            <p class="font-handwriting text-lg md:text-xl text-muted opacity-60 mb-1" id="hero-subtitle">✦ Lớp 9/13 ✦ Lưu bút thanh xuân ✦</p>
            <p class="font-handwriting text-sm text-muted opacity-40 mb-4" id="hero-quote">
                "Nơi những dòng lưu bút tìm về..."
            </p>
            
            <h1 class="font-heading text-7xl md:text-8xl mb-6 text-muted leading-tight" id="hero-title">
                Ký Ức<br>
                <span class="text-[#FF8AB8]">Trong Veo</span>
            </h1>
            
            <div id="hero-divider" class="w-16 h-0.5 bg-gradient-to-r from-[#FF8AB8] via-[#A5D6A7] to-[#81D4FA] mx-auto mb-6 rounded-full cursor-pointer" title="Có điều gì đó ẩn giấu..."></div>
            
            <!-- ===== Class Info Board ===== -->
            <div class="class-info-board mb-8" id="class-info">
                <div class="class-badge">
                    <span class="class-badge-number">9/13</span>
                    <span class="class-badge-label">Khoá — Ký Ức</span>
                </div>
                <p class="font-body text-sm md:text-base text-muted/70 leading-relaxed mt-3 max-w-lg mx-auto">
                    🌸 <strong class="text-[#FF8AB8]">Lớp 9/13</strong> — Nơi những chiếc lá vàng rơi báo hiệu mùa hè xa. 
                    Nơi những dòng lưu bút vẫn còn thơm mùi mực tím, 
                    những tấm hình Polaroid mờ nhòe vì nước mắt chia xa. 
                    <span class="text-[#A5D6A7]">✨ Giữ hộ nhau từng khoảnh khắc, để mãi là thanh xuân.</span>
                </p>
            </div>
            
            <!-- Enhanced Description -->
            <div class="space-y-3 mb-10" id="hero-description">
                <p class="font-body text-base md:text-lg text-muted opacity-80 leading-relaxed">
                    Mỗi tấm ảnh là một mảnh ghép, mỗi dòng viết là một nhịp tim.
                    <br class="hidden sm:block">
                    Nơi đây giữ hộ cậu những thước phim 
                    <span class="text-[#FF8AB8] font-semibold">thanh xuân</span> rực rỡ nhất.
                </p>
                <div class="flex items-center justify-center gap-3 text-xs text-muted/50">
                    <span>📸 Ảnh kỷ niệm</span>
                    <span class="w-1 h-1 rounded-full bg-muted/20"></span>
                    <span>✍️ Lưu bút</span>
                    <span class="w-1 h-1 rounded-full bg-muted/20"></span>
                    <span>🎵 Audio ghi âm</span>
                </div>
            </div>
            
            <!-- ===== Mini Gallery Strip ===== -->
            <div class="flex justify-center gap-3 mb-10 overflow-x-auto py-2 px-1" id="hero-gallery-strip">
                <div class="gallery-thumb w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 shadow-md ring-2 ring-white/50 transition-transform hover:scale-110 hover:rotate-[-2deg]">
                    <div class="w-full h-full bg-cover bg-center" style="background-image: url('https://picsum.photos/seed/class1/100/100')"></div>
                </div>
                <div class="gallery-thumb w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 shadow-md ring-2 ring-white/50 transition-transform hover:scale-110 hover:rotate-[2deg]">
                    <div class="w-full h-full bg-cover bg-center" style="background-image: url('https://picsum.photos/seed/class2/100/100')"></div>
                </div>
                <div class="gallery-thumb w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 shadow-md ring-2 ring-white/50 transition-transform hover:scale-110 hover:rotate-[-1deg]">
                    <div class="w-full h-full bg-cover bg-center" style="background-image: url('https://picsum.photos/seed/class3/100/100')"></div>
                </div>
                <div class="gallery-thumb w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 shadow-md ring-2 ring-white/50 transition-transform hover:scale-110 hover:rotate-[1deg]">
                    <div class="w-full h-full bg-cover bg-center" style="background-image: url('https://picsum.photos/seed/class4/100/100')"></div>
                </div>
                <div class="gallery-thumb w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 shadow-md ring-2 ring-white/50 transition-transform hover:scale-110 hover:rotate-[-2deg]">
                    <div class="w-full h-full bg-cover bg-center" style="background-image: url('https://picsum.photos/seed/class5/100/100')"></div>
                </div>
                <div class="gallery-thumb w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 shadow-md ring-2 ring-white/50 transition-transform hover:scale-110 hover:rotate-[2deg]">
                    <div class="w-full h-full bg-cover bg-center" style="background-image: url('https://picsum.photos/seed/class6/100/100')"></div>
                </div>
            </div>

            <!-- ⏳ Graduation Year Counter -->
            <div class="mb-8 inline-flex items-center gap-3 px-5 py-2 rounded-full bg-white/20 border border-[#A5D6A7]/20 text-sm">
                <span class="text-muted/60">⏳</span>
                <span class="font-body text-muted/70">Từ ngày tốt nghiệp —</span>
                <span id="grad-counter" class="font-heading text-[#FF8AB8] font-semibold">0 năm</span>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center" id="hero-buttons">
                <a href="auth.html" class="hero-btn px-8 md:px-10 py-4 font-heading text-lg md:text-xl transition-all cursor-pointer text-muted flex items-center gap-2 group bg-white/30 hover:bg-white/60 border border-[#FF8AB8]/20 hover:border-[#FF8AB8]/40 shadow-lg hover:shadow-xl">
                    <span>Ghi danh lưu bút</span>
                    <span class="inline-block transition-transform group-hover:translate-x-1">✎</span>
                </a>
                <a href="myclass.html" class="hero-btn px-8 md:px-10 py-4 font-heading text-lg md:text-xl transition-all cursor-pointer text-muted flex items-center gap-2 group bg-white/30 hover:bg-white/60 border border-[#FF8AB8]/20 hover:border-[#FF8AB8]/40 shadow-lg hover:shadow-xl">
                    <span>Thăm lớp mình</span>
                    <span class="inline-block transition-transform group-hover:translate-x-1">→</span>
                </a>
            </div>
            
            <!-- ===== Sticky Note Easter Egg Trigger ===== -->
            <div class="sticky-note hidden md:flex" id="sticky-note">
                <span class="sticky-note-text">💬 Click vào đây để xem điều thú vị!</span>
            </div>
            
            <div class="flex items-center justify-center gap-6 mt-8">
                <button id="audio-toggle" class="text-sm font-bold text-muted opacity-40 hover:opacity-100 flex items-center gap-2 transition-all">
                    <span id="audio-icon">🔇</span>
                    <span id="audio-text">Bật âm thanh</span>
                </button>
                <a href="easter.html" class="text-sm font-bold text-muted opacity-40 hover:opacity-100 flex items-center gap-2 transition-all group" title="Khám phá bí mật">
                    <span>🥚</span>
                    <span class="group-hover:animate-pulse">Bí mật thú vị</span>
                </a>
            </div>
        </div>

        <!-- Scroll indicator -->
        <div id="scroll-indicator" class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 opacity-0 z-10">
            <span class="text-xs font-body text-muted/40 tracking-widest">CUỘN XUỐNG</span>
            <div class="scroll-arrow">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-muted/60">
                    <path d="M12 5v14m0 0l-6-6m6 6l6-6"/>
                </svg>
            </div>
        </div>
    </template>

    <script type="module" src="assets/js/utils.js"></script>
    <script type="module" src="assets/js/loading.js"></script>
    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
