<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lưu Bút Thanh Xuân 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;500;700&family=Nunito:wght@300;400;600;700&family=Sriracha&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --sakura-pink: #ff8fab; --sakura-deep: #fb6f92; --text-human: #374151; --font-title: 'Mali', cursive; --font-body: 'Nunito', sans-serif; --font-hand: 'Sriracha', cursive; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #fffcf9; color: var(--text-human); font-family: var(--font-body); overflow-x: hidden; line-height: 1.6; }
        
        /* NỀN ẢNH RÕ NÉT */
        .bg-fixed-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover !important; background-position: center !important; background-attachment: fixed !important; z-index: -1; }
        .bg-main { background: linear-gradient(rgba(255,252,249,0.35), rgba(255,252,249,0.45)), url('assets/main.png'); }

        .indie-container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 10; }
        .section-wrapper { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        /* TIÊU ĐỀ TỰ NHIÊN */
        .title-indie { font-family: var(--font-title); font-size: clamp(2.8rem, 10vw, 6rem); color: var(--sakura-deep); line-height: 1.2; margin-bottom: 20px; text-shadow: 2px 2px 0px white; }
        .subtitle-indie { font-family: var(--font-hand); font-size: clamp(1.4rem, 4vw, 2.5rem); color: var(--text-human); margin-bottom: 50px; }
        
        /* CỤM NÚT BẤM VỮNG CHÃI */
        .btn-group { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .btn-indie { 
            font-family: var(--font-title); background: white; color: var(--text-human); 
            border: 2px solid #333; padding: 0 35px; height: 60px; border-radius: 50px; 
            box-shadow: 4px 4px 0px #333; transition: all 0.3s ease; 
            text-decoration: none; display: flex; align-items: center; justify-content: center; 
            gap: 12px; font-size: 1.1rem; min-width: 260px;
        }
        .btn-indie:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--sakura-pink); border-color: var(--sakura-pink); color: var(--sakura-pink); }
        
        #sakura-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .handwritten { font-family: var(--font-hand); }
    </style>
</head>
<body class="bg-main bg-fixed-layer">
    <div id="sakura-container"></div>

    <div class="indie-container">
        <section class="section-wrapper">
            <p class="handwritten" style="font-size: 1.6rem; color: var(--text-human); margin-bottom: 10px;">Thương gửi niên khóa 2022 - 2026</p>
            <h1 class="title-indie">Ký Ức Trong Veo</h1>
            <p class="subtitle-indie">Gói ghém thanh xuân vào từng cánh hoa</p>
            
            <div class="btn-group">
                <a href="sign.html" class="btn-indie">
                    <i data-lucide="pen-tool"></i>
                    <span>GHI DANH LƯU BÚT</span>
                </a>
                <a href="myclass.html" class="btn-indie" style="box-shadow: 4px 4px 0px #3b82f6; border-color: #333;">
                    <i data-lucide="users"></i>
                    <span>GHÉ THĂM LỚP MÌNH</span>
                </a>
            </div>

            <div class="handwritten" style="margin-top: 80px; opacity: 0.6; font-size: 1.4rem;">
                Kéo xuống để cùng tớ lật giở kỷ niệm nhé...
            </div>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        window.addEventListener('load', () => {
            lucide.createIcons();
            
            // Hoạt ảnh hiện hình an toàn
            gsap.from(".title-indie, .subtitle-indie, .btn-group", { 
                opacity: 0, 
                y: 20, 
                duration: 1, 
                stagger: 0.2, 
                ease: "power2.out",
                clearProps: "all" // Xóa sạch thuộc tính sau khi xong để CSS giữ bố cục
            });
            
            // Sakura rơi
            const container = document.getElementById('sakura-container');
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.innerHTML = '🌸';
                p.style.cssText = `position:fixed; top:-50px; left:${Math.random()*100}vw; font-size:${Math.random()*20+15}px; opacity:${Math.random()*0.5}; pointer-events:none; z-index:100;`;
                container.appendChild(p);
                gsap.to(p, { y: '110vh', x: '+=150', rotation: 360, duration: 8 + Math.random() * 5, repeat: -1, delay: Math.random() * 5, ease: 'none' });
            }
        });
    </script>
</body>
</html>
