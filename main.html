<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ký Ức Trong Veo 2026</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="sakura-container"></div>
    <div class="sun-flare"></div>

    <main class="content-anchor">
        <div class="label-cap" style="opacity: 0.5; margin-bottom: 25px;">A_VISUAL_JOURNEY_BY_CLASS_2026</div>
        <h1 class="title-presentation">Ký Ức <br> <span style="color: var(--sakura-vibrant);">Trong Veo</span></h1>
        <p class="subtitle-presentation">Nơi những đóa hoa rực rỡ nhất không bao giờ tàn.</p>
        
        <!-- CỤM NÚT ĐIỀU HƯỚNG MỚI -->
        <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 50px;">
            <a href="sign.html" class="google-btn-premium">
                <i data-lucide="user-plus"></i>
                <span>GHI DANH / SỬA HỒ SƠ</span>
            </a>
            <a href="myclass.html" class="secondary-btn-premium">
                <i data-lucide="eye"></i>
                <span>XEM LỚP CHÚNG MÌNH</span>
            </a>
        </div>

        <div style="margin-top: 80px; opacity: 0.2;" class="label-cap">SCROLL_TO_DISCOVER_MORE</div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        lucide.createIcons();
        
        // Animation Entry
        gsap.from(".content-anchor > *", { 
            opacity: 0, 
            y: 20, 
            duration: 1.2, 
            stagger: 0.15, 
            ease: "power2.out",
            clearProps: "all" 
        });
        
        // Sakura Cinematic
        const container = document.getElementById('sakura-container');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.innerHTML = '🌸';
            p.style.cssText = `position:fixed; top:-50px; left:${Math.random()*100}vw; font-size:${Math.random()*20+15}px; opacity:${Math.random()*0.4}; pointer-events:none; z-index:1;`;
            container.appendChild(p);
            gsap.to(p, { y: '110vh', x: '+=150', rotation: 360, duration: 8 + Math.random() * 5, repeat: -1, delay: Math.random() * 5, ease: 'none' });
        }
    </script>
</body>
</html>
