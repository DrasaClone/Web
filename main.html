<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ký Ức Trong Veo 2026</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-main bg-fixed-layer">
    <div id="sakura-container"></div>

    <div class="indie-container">
        <section class="section-wrapper" style="min-height: 100vh;">
            <p class="handwritten" style="font-size: 1.6rem; color: var(--text-human); margin-bottom: 10px;">Thương gửi niên khóa 2022 - 2026</p>
            <h1 class="title-indie">Ký Ức Trong Veo</h1>
            <p class="subtitle-indie">"Dành cho những ngày tháng chúng mình rực rỡ nhất"</p>
            
            <div class="btn-group">
                <a href="sign.html" class="btn-indie">
                    <i data-lucide="pen-tool"></i>
                    <span>MỞ CUỐN LƯU BÚT</span>
                </a>
                <a href="myclass.html" class="btn-indie" style="box-shadow: 4px 4px 0px var(--sky-blue); border-color: var(--sky-blue);">
                    <i data-lucide="users"></i>
                    <span>GHÉ THĂM LỚP MÌNH</span>
                </a>
            </div>

            <div style="margin-top: 80px; opacity: 0.5;" class="handwritten">
                Kéo xuống xem tiếp cùng tớ nhé ↓
            </div>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        lucide.createIcons();
        const container = document.getElementById('sakura-container');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.innerHTML = '🌸';
            p.style.cssText = `position:fixed; top:-50px; left:${Math.random()*100}vw; font-size:${Math.random()*20+15}px; opacity:${Math.random()*0.4}; pointer-events:none; z-index:100;`;
            container.appendChild(p);
            gsap.to(p, { y: '110vh', x: '+=150', rotation: 360, duration: 8 + Math.random() * 5, repeat: -1, delay: Math.random() * 5, ease: 'none' });
        }
    </script>
</body>
</html>
